<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Abdallah's Birthday Quest ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a2e;display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
#wrap{position:relative;display:inline-block}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#modal{display:none;position:absolute;inset:0;background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;z-index:20;font-family:'Press Start 2P',monospace}
#modal.on{display:flex}
.mbox{max-width:86%;background:#0c001e;border:3px solid #FFB600;
  padding:20px 24px;text-align:center;position:relative;animation:mpop .22s ease}
.mbox::before,.mbox::after,.mb2::before,.mb2::after{content:'';position:absolute;
  width:12px;height:12px;border-color:#FFD700;border-style:solid}
.mbox::before{top:-7px;left:-7px;border-width:3px 0 0 3px}
.mbox::after{top:-7px;right:-7px;border-width:3px 3px 0 0}
.mb2::before{bottom:-7px;left:-7px;border-width:0 0 3px 3px}
.mb2::after{bottom:-7px;right:-7px;border-width:0 3px 3px 0}
@keyframes mpop{from{transform:scale(.6) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mt{color:#FFD700;font-size:clamp(7px,2.2vw,13px);margin-bottom:12px;
  text-shadow:0 0 10px #FFB60088;letter-spacing:1px;line-height:1.8}
.mm{color:#e8e0ff;font-size:clamp(5px,1.5vw,8.5px);line-height:2.3;
  margin-bottom:16px;white-space:pre-line}
.mbtn{background:#FFB600;color:#000;border:none;cursor:pointer;padding:8px 24px;
  font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.2vw,8px);
  text-transform:uppercase;transition:background .15s}
.mbtn:hover{background:#FFD700}
#ctrl{display:none;position:absolute;bottom:4px;left:0;right:0;padding:4px 8px;
  justify-content:space-between;align-items:flex-end;pointer-events:none}
@media(max-width:900px),(pointer:coarse){#ctrl{display:flex}}
.cg{display:flex;gap:4px;pointer-events:all}
.cb{width:46px;height:46px;border-radius:50%;background:rgba(255,182,0,.18);
  border:2px solid rgba(255,182,0,.42);color:#FFB600;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;touch-action:none}
.cb.held,.cb:active{background:rgba(255,182,0,.48)}
#soundbtn{position:absolute;top:4px;right:4px;width:28px;height:28px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,182,0,.4);
  color:#FFB600;font-size:14px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;z-index:30;border-radius:4px;user-select:none}
#soundbtn:hover{background:rgba(255,182,0,.3)}
#musicbtn{position:absolute;top:4px;right:36px;width:28px;height:28px;background:rgba(0,0,0,.55);border:1px solid rgba(255,182,0,.4);color:#FFB600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:30;border-radius:4px;user-select:none}
#musicbtn:hover{background:rgba(255,182,0,.3)}
</style>

<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="modal"><div class="mbox" id="mbox">
  <div class="mb2" style="position:absolute;inset:-7px;pointer-events:none"></div>
  <div class="mt" id="mtitle"></div>
  <div class="mm" id="mmsg"></div>

</div></div>
<div id="musicbtn" onclick="toggleMusic()" title="Music On/Off (M)">🎵</div>
<div id="soundbtn" onclick="toggleSound()" title="Sound FX On/Off">🔊</div>
<div id="ctrl">
  <div class="cg" id="cg-lr"><div class="cb" id="bl">◀</div><div class="cb" id="br">▶</div></div>
  <div class="cg" id="cg-act"><div class="cb" id="bj" style="width:54px;height:54px;font-size:22px">▲</div></div>
</div>
</div>
<script>
// ╔══════════════════════════════════════════════════════════╗
//   🎮  ABDALLAH'S BIRTHDAY QUEST  v4
//   4 Worlds · Fixed Physics · Sound FX · Boss Fight
// ╚══════════════════════════════════════════════════════════╝

// ── CANVAS ───────────────────────────────────────────────────
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const GW=320,GH=180;
let SC=1;
function resize(){
  SC=Math.max(1,Math.min(Math.floor(innerWidth/GW),Math.floor(innerHeight/GH)));
  cv.width=GW*SC;cv.height=GH*SC;ctx.imageSmoothingEnabled=false;
}
resize();onresize=resize;
const s=v=>v*SC;
function r(x,y,w,h,c,cam=true){ctx.fillStyle=c;ctx.fillRect(s(x-(cam?camX:0)),s(y),s(w),s(h));}

// ── INPUT ────────────────────────────────────────────────────
const K={},T={l:0,r:0,j:0};
let modalOpen=false;
document.addEventListener('keydown',e=>{
  K[e.code]=1;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))e.preventDefault();
  if(modalOpen){if(['Enter','Space','Escape'].includes(e.code))closeMsg();return;}
  // Cake name typing during ending stage 4
  if(gs==='play'&&LDATA[lvlI]&&LDATA[lvlI].type==='final'&&FW.phase===3&&END.stage===4&&END.cakeInputActive){
    if(e.code==='Enter'||e.code==='NumpadEnter'){END.cakeNameDone=true;END.cakeInputActive=false;snd('pup');return;}
    if(e.code==='Backspace'){END.cakeName=END.cakeName.slice(0,-1);return;}
    if(e.key.length===1&&/[a-zA-Z0-9 \u0621-\u064A!.]/.test(e.key)&&END.cakeName.length<12){
      END.cakeName+=e.key;return;
    }
    return;
  }
  // Pause toggle
  if(e.code==='KeyM'){toggleMusic();return;}
  // Secret final line trigger in ending
  if(gs==='play'&&LDATA[lvlI]&&LDATA[lvlI].type==='final'
     &&FW.phase===3&&END.stage===7&&!END.secretShown){
    END.secretShown=true;END.secretTimer=0;
    // don't return — allow key to propagate
  }
  if(e.code==='Escape'||e.code==='KeyP'){
    if(fade.dir!==0)return; // never pause during a transition
    if(gs==='play'&&LDATA[lvlI]&&LDATA[lvlI].type==='final'){fwPaused=!fwPaused;return;}
    if(gs==='play'){gs='pause';return;}
    if(gs==='pause'){gs='play';return;}
  }
  // R = restart current level (from pause or play)
  if(e.code==='KeyR'){
    if(LDATA[lvlI]&&LDATA[lvlI].type==='final'){initFinal();fwPaused=false;gs='play';return;}
    if(gs==='pause'||gs==='play'){
      initLevel(lvlI);gs='intro';introTimer=0;stopMusic();return;
    }
  }
  if(gs==='pause')return;
  if(gs==='title'&&['Enter','Space'].includes(e.code))gs='wselect';
  if(gs==='wselect'){const n=parseInt(e.key);if(n>=1&&n<=4)startWorld(n-1);}
  if(gs==='wclear'&&['Enter','Space'].includes(e.code))gs='wselect';
  if(gs==='win'&&['Enter','Space'].includes(e.code))gs='title';
  if(gs==='intro'&&['Enter','Space'].includes(e.code)){gs='play';}
  if(gs==='over'&&['Enter','Space'].includes(e.code)){
    lives=3; // reset lives when going back to world select
    gs='wselect';
  }
});
document.addEventListener('keyup',e=>K[e.code]=0);
['bl','br','bj'].forEach((id,i)=>{
  const el=document.getElementById(id),prop=['l','r','j'][i];
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();T[prop]=1;el.classList.add('held');},{passive:false}));
  ['touchend','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();T[prop]=0;el.classList.remove('held');},{passive:false}));
});
cv.addEventListener('click',()=>{
  if(gs==='title')gs='wselect';
  if(gs==='wclear')gs='wselect';
  if(gs==='win')gs='title';
  if(gs==='intro')gs='play';
  if(gs==='over'){lives=3;gs='wselect';}
});
const goL=()=>K.ArrowLeft||K.KeyA||T.l;
const goR=()=>K.ArrowRight||K.KeyD||T.r;
const doJ=()=>K.ArrowUp||K.Space||K.KeyW||T.j;

// ── AUDIO ────────────────────────────────────────────────────
let AC=null;
function initAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function osc(freq,dur,type,vol,slide,delay){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  const t=AC.currentTime+(delay||0);
  o.type=type||'square';
  o.frequency.setValueAtTime(freq,t);
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur);
  g.gain.setValueAtTime(vol||0.2,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
const SFX={
  jump  :()=>{osc(260,.08,'square',.18,600);},
  stomp :()=>{osc(180,.1,'square',.28,50);osc(90,.07,'square',.14,40);},
  coin  :()=>{osc(1046,.05,'sine',.2);osc(1318,.1,'sine',.16,null,.06);},
  coin2 :()=>{osc(1174,.05,'sine',.2);osc(1480,.1,'sine',.16,null,.06);},
  coin3 :()=>{osc(1318,.05,'sine',.2);osc(1760,.1,'sine',.16,null,.06);},
  gift  :()=>{[[523,0],[659,.07],[784,.14],[1046,.21]].forEach(([f,d])=>osc(f,.09,'square',.2,null,d));},
  block :()=>{osc(400,.08,'square',.26,220);},
  hurt  :()=>{osc(220,.25,'sawtooth',.22,90);},
  death :()=>{[494,392,330,262,220,196,165,131].forEach((f,i)=>osc(f,.08,'square',.2,null,i*.07));},
  clear :()=>{[[523,0,.12],[659,.14,.12],[784,.28,.12],[1046,.42,.22],[784,.66,.08],[1046,.76,.4]].forEach(([f,d,dr])=>osc(f,dr,'square',.18,null,d));},
  cinematic:()=>{[262,330,392,523,659].forEach((f,i)=>osc(f,.18,'sine',.12,null,i*.22));},
  boom  :()=>{osc(80,.6,'sawtooth',.35,40);osc(160,.4,'sawtooth',.2,60,.1);},
  rise  :()=>{[196,247,294,349,392,494,523].forEach((f,i)=>osc(f,.12,'sine',.1,null,i*.08));},
  whisper:()=>{osc(523,.5,'sine',.08,440);osc(659,.5,'sine',.06,523,.2);},
  heartbeat:()=>{osc(60,.08,'sine',.18,50);osc(60,.08,'sine',.18,50,.28);},
  celebration:()=>{[523,659,784,1047,784,659,523,659,784,1047,1319,1047].forEach((f,i)=>osc(f,.1,'square',.15,null,i*.12));},
  laser :()=>{osc(880,.06,'square',.14,200);},
  pup   :()=>{osc(660,.08,'square',.2);osc(880,.08,'square',.18,null,.09);osc(1100,.1,'square',.16,null,.18);},
  shoot :()=>{osc(720,.05,'square',.12,1100);},
  explode:()=>{osc(150,.15,'sawtooth',.3,40);osc(80,.2,'sawtooth',.2,30,.05);},
  boss  :()=>{[330,262,220,185,165].forEach((f,i)=>osc(f,.12,'sawtooth',.25,null,i*.1));},
  land  :()=>{osc(280,.05,'square',.1,380);},
};
function snd(n){if(muted)return;try{initAC();SFX[n]&&SFX[n]();}catch(e){}}

// ── FADE TRANSITION ──────────────────────────────────────────
// Simple black fade: fade out → fire callback → fade in. No blocking guards.
let fade={alpha:0,dir:0,cb:null};
function startWipe(cb){
  if(fade.dir===1){
    fade.cb=cb;return;
  }
  if(fade.dir===-1){
    // Currently fading in - restart a full fade cycle
    fade.dir=1;fade.alpha=0;fade.cb=cb;return;
  }
  // Idle - start normally
  fade.alpha=0;fade.dir=1;fade.cb=cb;
}
function updateWipe(){
  if(fade.dir===0)return;
  if(fade.dir===1){
    fade.alpha=Math.min(1,fade.alpha+0.08);
    if(fade.alpha>=1){
      fade.dir=-1;
      if(fade.cb){fade.cb();fade.cb=null;}
    }
  } else {
    fade.alpha=Math.max(0,fade.alpha-0.08);
    if(fade.alpha<=0)fade.dir=0;
  }
}
function drawWipe(){
  if(fade.alpha<=0)return;
  ctx.fillStyle='rgba(0,0,0,'+fade.alpha+')';
  ctx.fillRect(0,0,cv.width,cv.height);
}

// ── COIN TRACKER ─────────────────────────────────────────────
let coinsPitched=0; // cycles through 0,1,2 for coin1/2/3 pitch
function playCoin(){
  const snames=['coin','coin2','coin3'];
  snd(snames[coinsPitched%3]);
  coinsPitched++;
}


let musicAC=null,musicNodes=[],musicPlaying='',musicVol=0.055;
const SCALES={
  mario:[262,294,330,349,392,440,494,523],  // C major — bright, heroic
  ci:   [220,247,262,294,330,370,392,440],  // A minor — tense space
  dash: [185,208,220,247,277,311,330,370],  // F# minor — electric, driven
  final:[196,220,247,262,294,330,392,440],  // G minor — epic, emotional
  memory:[261,293,329,392,440,523,587,659], // C pentatonic major — open, floating
};
const PATTERNS={
  mario: [0,2,4,7, 4,2,0,4, 2,4,7,9, 7,4,2,0, 0,4,7,12,7,4,0,4],
  ci:    [0,0,3,5, 7,5,3,0, 5,3,0,3, 5,7,10,7, 0,3,5,7, 5,3,0,5],
  dash:  [0,3,5,7, 10,7,5,3, 0,5,7,10,12,10,7,5, 0,3,7,10,7,3,0,3],
  final: [0,2,3,5, 7,5,3,2, 0,5,7,10, 7,5,3,0, 2,3,5,7, 10,7,5,3],
  // Calm, floating melody — slow arpeggios with lots of space
  memory:[0,2,4,2, 0,4,7,4, 2,4,7,4, 0,7,4,2, 4,7,9,7, 4,2,0,2],
};
let musicStep=0,musicTick=0,musicTickRate=18;

function initMusic(){
  if(!musicAC)try{musicAC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function stopMusic(){
  musicNodes.forEach(n=>{try{n.stop();n.disconnect();}catch(e){}});
  musicNodes=[];musicPlaying='';
}
function startMusic(theme){
  if(muted||musicMuted||musicPlaying===theme)return;
  stopMusic();initMusic();if(!musicAC)return;
  musicPlaying=theme;musicStep=0;musicTick=0;
}
function tickMusic(){
  if(muted||musicMuted||!musicAC||!musicPlaying)return;
  const theme=musicPlaying;
  const scale=SCALES[theme]||SCALES.mario;
  const pattern=PATTERNS[theme]||PATTERNS.mario;
  // Memory runner plays slower
  const tickRate=theme==='memory'?30:musicTickRate;
  musicTick++;
  if(musicTick%tickRate!==0)return;
  const noteIdx=musicStep%pattern.length;
  const deg=pattern[noteIdx];
  const oct=Math.floor(deg/scale.length);
  const freq=scale[deg%scale.length]*(1<<oct);
  musicStep++;
  try{
    const t=musicAC.currentTime;
    if(theme==='memory'){
      // Dreamy: soft sine melody with long fade
      const o=musicAC.createOscillator();
      const g=musicAC.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(musicVol*1.1,t+0.06);
      g.gain.exponentialRampToValueAtTime(0.001,t+tickRate/60*2.2);
      o.connect(g);g.connect(musicAC.destination);
      o.start(t);o.stop(t+tickRate/60*2.5);
      musicNodes.push(o);
      // Soft pad harmony — a fifth above, very quiet triangle
      if(musicStep%2===0){
        const p2=musicAC.createOscillator();
        const g2=musicAC.createGain();
        p2.type='triangle';
        p2.frequency.setValueAtTime(freq*1.5,t);
        g2.gain.setValueAtTime(0,t);
        g2.gain.linearRampToValueAtTime(musicVol*0.35,t+0.1);
        g2.gain.exponentialRampToValueAtTime(0.001,t+tickRate/60*3);
        p2.connect(g2);g2.connect(musicAC.destination);
        p2.start(t);p2.stop(t+tickRate/60*3.2);
        musicNodes.push(p2);
      }
      // Very soft low pad every 4 steps
      if(musicStep%4===0){
        const b=musicAC.createOscillator();
        const bg=musicAC.createGain();
        b.type='sine';
        b.frequency.setValueAtTime(freq/2,t);
        bg.gain.setValueAtTime(0,t);
        bg.gain.linearRampToValueAtTime(musicVol*0.25,t+0.15);
        bg.gain.exponentialRampToValueAtTime(0.001,t+tickRate/60*4);
        b.connect(bg);bg.connect(musicAC.destination);
        b.start(t);b.stop(t+tickRate/60*4.2);
        musicNodes.push(b);
      }
    } else {
      // Standard themes
      const o=musicAC.createOscillator();
      const g=musicAC.createGain();
      o.type=theme==='dash'?'sawtooth':'square';
      o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(musicVol,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+musicTickRate/60*.85);
      o.connect(g);g.connect(musicAC.destination);
      o.start(t);o.stop(t+musicTickRate/60+.01);
      musicNodes.push(o);
      // Bass note every 4 steps
      if(musicStep%4===0){
        const b=musicAC.createOscillator();
        const bg=musicAC.createGain();
        b.type='triangle';
        b.frequency.setValueAtTime(freq/2,t);
        bg.gain.setValueAtTime(musicVol*.6,t);
        bg.gain.exponentialRampToValueAtTime(0.001,t+musicTickRate/60*1.8);
        b.connect(bg);bg.connect(musicAC.destination);
        b.start(t);b.stop(t+musicTickRate/60*2+.01);
        musicNodes.push(b);
      }
    }
    if(musicNodes.length>12)musicNodes.splice(0,6);
  }catch(e){}
}
function updateMusicTheme(){
  if(!gs||gs==='title'||gs==='wselect'||gs==='win'||gs==='wclear'||gs==='over'){
    if(musicPlaying)stopMusic();return;
  }
  // Stop music during cinematic ending
  if(gs==='play'&&LDATA[lvlI]&&LDATA[lvlI].type==='final'&&FW.phase===3){
    if(musicPlaying)stopMusic();return;
  }
  if(gs==='play'||gs==='pause'||gs==='msg'||gs==='intro'||gs==='dying'){
    const L=LDATA[lvlI];
    let theme=L.type==='ci'?'ci':L.type==='dash'?'dash':L.type==='final'?'final':'mario';
    // Memory runner phase gets its own calm dreamy theme
    if(L.type==='final'&&FW.phase===2)theme='memory';
    if(musicPlaying!==theme)startMusic(theme);
    tickMusic();
  }
}


// ── MEMORY RUNNER PHOTOS ─────────────────────────────────────
const MR_PHOTOS=(()=>{

let muted=false,musicMuted=false;
function toggleMusic(){
  musicMuted=!musicMuted;
  document.getElementById('musicbtn').textContent=musicMuted?'🔕':'🎵';
  if(musicMuted)stopMusic();
}
function toggleSound(){
  muted=!muted;
  document.getElementById('soundbtn').textContent=muted?'🔇':'🔊';
  if(muted){
    if(AC)try{AC.suspend();}catch(e){}
    stopMusic();
  } else {
    if(AC)try{AC.resume();}catch(e){}
  }
  // sound toggle does not affect music mute state
}

function calcStars(){
  // 3 stars = finish with 3 lives and full hearts
  // 2 stars = finish with 2+ lives
  // 1 star = finish
  if(lives>=3&&player&&player.hearts>=3)return 3;
  if(lives>=2)return 2;
  return 1;
}

  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=fast?2.5+Math.random()*4:1+Math.random()*2.5;
    PARTS.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(fast?3:1.5),col:col,life:30+Math.random()*25,max:55,w:1.5+Math.random()*2.5});
  }
}
function coinPop(wx,wy){burst(wx,wy,"#FFD700",6,true);}// kept as alias

function confettiBurst(cx,cy,n){
  const cols=['#FFD700','#FF4466','#44AAFF','#44FF88','#FF88AA','#FFAA00','#CC44FF','#00FFCC'];
  for(let i=0;i<n;i++){

    PARTS.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,
      col:cols[i%cols.length],life:50+Math.random()*40,max:90,w:2+Math.random()*3});
  }
}

  const b=e.y+e.h,lx=e.x+2,rx=e.x+e.w-2;
  for(const mp of mplats){
    if(rx>mp.x&&lx<mp.x+mp.w&&b>=mp.y-2&&b<=mp.y+10)return mp;
  }return null;
}
function platLand(e,L){
  if(e.vy<0)return false;
  const b=e.y+e.h,lx=e.x+2,rx=e.x+e.w-2;
  for(const p of L.platforms){if(b>=p.y&&b<=p.y+9&&rx>p.x&&lx<p.x+p.w)return p.y;}
  return false;
}
function headHitQ(e){
  if(e.vy>0)return null;
  const t=e.y,lx=e.x+2,rx=e.x+e.w-2;
  for(const q of qblocks){
    if(!q.hit&&t<=q.y+16&&t>=q.y+6&&rx>q.x&&lx<q.x+16)return q;
  }return null;
}
function applyPhys(e,L,isP){
  e.vy=Math.min(e.vy+GV,MAXFALL);
  e.y+=e.vy;
  const wasG=e.gnd;e.gnd=false;
  if(isP){
    const mp=rideMplat(e);
    if(mp){e.y=mp.y-e.h;e.vy=0;e.gnd=true;e.x+=mp.vx;if(!wasG){snd('land');burst(e.x+e.w/2,e.y+e.h,'#C8B090',6,false);}}
  }
  if(!e.gnd){
    const py=platLand(e,L);
    if(py!==false){e.y=py-e.h;e.vy=0;e.gnd=true;if(!wasG&&isP)burst(e.x+e.w/2,e.y+e.h,'#C8B090',6,false);}
  }
  if(!e.gnd&&overSeg(e,L)&&e.y+e.h>=L.groundY){
    e.y=L.groundY-e.h;e.vy=0;e.gnd=true;
    if(!wasG&&isP)burst(e.x+e.w/2,e.y+e.h,'#C8B090',8,false);
  }
  e.x+=e.vx;
  e.x=Math.max(0,Math.min(e.x,L.worldW-e.w));
}
function updateMplats(){
  mplats.forEach(mp=>{
    mp.x+=mp.vx;mp.y+=mp.vy;
    if(mp.vx>0&&mp.x+mp.w>=mp.ex){mp.x=mp.ex-mp.w;mp.vx*=-1;}
    if(mp.vx<0&&mp.x<=mp.sx){mp.x=mp.sx;mp.vx*=-1;}
    if(mp.vy>0&&mp.y>=mp.ey){mp.y=mp.ey;mp.vy*=-1;}
    if(mp.vy<0&&mp.y<=mp.sy){mp.y=mp.sy;mp.vy*=-1;}
  });
}

// ── DEATH ────────────────────────────────────────────────────
function startDying(bounce){
  if(gs==='dying')return;
  snd('death');addShake(8);
  const L=LDATA[lvlI];
  if(L.type==='dash'){
    // Dash has no bounce animation — just lose a life and restart
    gs='dying';player.dVy=0;player.dRot=0;player.vx=0;
    // Trigger death end immediately after a brief pause via a timer
    L._deathTimer=40;
    return;
  }
  gs='dying';
  player.dVy=bounce?-5.5:Math.max(player.vy,0);
  player.dRot=0;player.vx=0;
}
// Called after death animation completes
function onDeathEnd(){
  lives--;
  if(lives<=0){gs='over';}
  else{
    const L=LDATA[lvlI];
    // For dash: restore to checkpoint if earned
    if(L.type==='dash'&&dashCheckpt>0){
      const cp=dashCheckpt;
      initLevel(lvlI);
      dashOff=cp;dashCheckpt=cp;
      // Mark obs before checkpoint as already collected
      dashObs.forEach(o=>{if(o.x<cp-50&&(o.t==='gift'))o.got=true;});
    } else {
      initLevel(lvlI);
    }
    gs='intro';introTimer=0;
  }
}

// ── UPDATE ───────────────────────────────────────────────────
function update(){
  updateWipe();
  if(gs==='pause'){frame++;decShake();return;}
  if(gs==='intro'){frame++;introTimer++;updParts();if(introTimer>165)gs='play';return;}
  if(gs==='dying'){
    frame++;updParts();
    const p=player;
    const L=LDATA[lvlI];
    if(L.type==='dash'){
      // Dash death: brief flash then restart
      L._deathTimer=(L._deathTimer||0)-1;
      if(L._deathTimer<=0){L._deathTimer=0;onDeathEnd();}
      return;
    }
    p.dVy+=.28;p.y+=p.dVy;p.dRot+=.15;
    if(L.worldW){camX+=(p.x-GW/2+p.w/2-camX)*.04;camX=Math.max(0,Math.min(camX,L.worldW-GW));}
    if(p.y>GH+90)onDeathEnd();
    return;
  }
  if(gs!=='play')return;
  if(fwPaused)return;
  const L=LDATA[lvlI];frame++;
  if(L.type==='mario')updateMarioLevel(L);
  else if(L.type==='ci')updateCI(L);
  else if(L.type==='dash')updateDash(L);
  else if(L.type==='final')updateFinal();
}

// ── MARIO/ROYALE UPDATE ───────────────────────────────────────
function updateMarioLevel(L){
  updParts();updateMplats();
  const p=player;
  if(p.inv>0)p.inv--;

  // FIXED MOVEMENT: acceleration + coyote time + jump buffer
  if(goL()){p.vx=p.gnd?Math.max(p.vx-GND_ACC,-MAX_SPD):Math.max(p.vx-AIR_ACC,-MAX_SPD);p.dir=-1;}
  else if(goR()){p.vx=p.gnd?Math.min(p.vx+GND_ACC,MAX_SPD):Math.min(p.vx+AIR_ACC,MAX_SPD);p.dir=1;}
  else p.vx*=p.gnd?GND_FRC:AIR_FRC;
  if(p.gnd&&Math.abs(p.vx)>.2)p.wf++;

  // Coyote time
  if(p.gnd)p.coyote=6;else if(p.coyote>0)p.coyote--;
  // Jump buffer
  if(doJ()&&!p.prevJ)p.jbuf=8;else if(p.jbuf>0)p.jbuf--;
  p.prevJ=doJ();
  // Apply jump (with double jump support)
  if(p.jbuf>0&&p.coyote>0&&!p.jp){
    p.vy=JF;p.jp=true;p.coyote=0;p.jbuf=0;
    p.djumpUsed=false;// reset double jump on landing
    snd('jump');burst(p.x+p.w/2,p.y+p.h,'#ffffff',5,false);
  } else if(p.jbuf>0&&!p.gnd&&p.djump&&!p.djumpUsed&&!p.jp){
    // Double jump in air
    p.vy=JF*.88;p.djumpUsed=true;p.jp=true;p.jbuf=0;
    snd('jump');burst(p.x+p.w/2,p.y+p.h,'#00FFCC',8,true);
    burst(p.x+p.w/2,p.y,'#00FFCC',5,false);
  }
  if(!doJ())p.jp=false;
  if(p.gnd){p.djumpUsed=false;}// reset on ground

  applyPhys(p,L,true);

  // Q-block hit
  const hq=headHitQ(p);
  if(hq){
    hq.hit=true;hq.bnc=7;p.vy=Math.abs(p.vy)*.4;
    snd('block');burst(hq.x+8,hq.y,'#FFD700',14,false);
    if(hq.gi!=null){
      // Gift block — show birthday message
      giftsFound++;showMsg(hq.gi);if(giftsFound>=totalGifts())portalOpen=true;
    } else {
      // Power-up block — rotate types by block index so they're always different
      const puTypes=['mushroom','gun','heart','djump'];
      const hitIdx=qblocks.filter(q=>q.hit).length-1;
      const t=puTypes[hitIdx%puTypes.length];
      powerUps.push({x:hq.x,y:hq.y-2,vx:.8,vy:-1.5,type:t,collected:false});
      snd('pup');
    }
  }
  qblocks.forEach(q=>{if(q.bnc>0)q.bnc=Math.max(0,q.bnc-.7);});

  // Power-up update
  for(let i=powerUps.length-1;i>=0;i--){
    const pu=powerUps[i];
    if(pu.collected){powerUps.splice(i,1);continue;}
    const puL=LDATA[lvlI];
    // Gravity
    pu.vy=Math.min(pu.vy+GV*.55,5);
    pu.y+=pu.vy;
    // Land on platform
    const py2=platLand(pu,puL);
    if(py2!==false){pu.y=py2-12;pu.vy=0;pu.vx=0;}// STOP sliding on land
    // Land on ground segment
    else if(overSeg(pu,puL)&&pu.y+12>=puL.groundY){pu.y=puL.groundY-12;pu.vy=0;pu.vx=0;}// STOP
    // Slide only while airborne
    if(pu.vy!==0)pu.x+=pu.vx;
    // Remove if fallen into pit
    if(pu.y>puL.groundY+100){powerUps.splice(i,1);continue;}
    // Bounce off walls
    if(pu.x<4){pu.x=4;pu.vx=Math.abs(pu.vx)*.5;}
    if(pu.x+12>puL.worldW-4){pu.x=puL.worldW-16;pu.vx=-Math.abs(pu.vx)*.5;}
    // Collect — generous radius so player can easily grab it
    const pdx=Math.abs(pu.x+6-(p.x+p.w/2)),pdy=Math.abs(pu.y+6-(p.y+p.h/2));
    if(pdx<18&&pdy<20){
      pu.collected=true;snd('pup');
      if(pu.type==='heart'){p.hearts=Math.min(p.hearts+1,5);burst(p.x+p.w/2,p.y,'#FF6677',14,true);}
      else if(pu.type==='gun'){p.hasGun=true;p.gunAmmo=15;burst(p.x+p.w/2,p.y,'#44AAFF',14,true);}
      else if(pu.type==='mushroom'){p.halfDmg=true;burst(p.x+p.w/2,p.y,'#FF8800',14,true);}
      else if(pu.type==='djump'){p.djump=true;p.djumpUsed=false;burst(p.x+p.w/2,p.y,'#00FFCC',16,true);}
    }
  }

  // Player gun bullets
  if(p.hasGun&&p.gunAmmo>0&&p.gunCooldown>0)p.gunCooldown--;
  if(p.hasGun&&p.gunAmmo>0&&p.gunCooldown<=0&&doJ()&&p.gnd===false){
    // Shoot on jump key while in air — or on separate press: use K.KeyF or K.KeyZ
  }
  // Shoot on F key or Z key
  if(p.hasGun&&p.gunAmmo>0&&p.gunCooldown<=0&&(K.KeyF||K.KeyZ||K.ShiftLeft)){
    playerBullets.push({x:p.x+(p.dir>0?p.w+2:-4),y:p.y+4,vx:p.dir*5,alive:true});
    p.gunAmmo--;p.gunCooldown=14;snd('shoot');
    if(p.gunAmmo<=0)p.hasGun=false;
  }
  for(let i=playerBullets.length-1;i>=0;i--){
    const b=playerBullets[i];b.x+=b.vx;
    if(b.x<-20||b.x>LDATA[lvlI].worldW+20||!b.alive){playerBullets.splice(i,1);continue;}
    // Hit enemies
    for(const en of enemies){
      if(!en.alive)continue;
      if(b.x+4>en.x&&b.x<en.x+en.w&&b.y+2>en.y&&b.y<en.y+en.h){
        en.alive=false;en.dt=0;b.alive=false;
        snd('stomp');
        burst(en.x+en.w/2,en.y+en.h/2,'#4CAF50',14,true);break;
      }
    }
  }





  // Shell physics + enemy kill
  for(let i=shells.length-1;i>=0;i--){
    const sh=shells[i];
    if(sh.kicked){
      sh.vy=Math.min(sh.vy+GV,MAXFALL);sh.y+=sh.vy;
      // Land on platforms
      const sply=platLand(sh,L);if(sply!==false){sh.y=sply-sh.h;sh.vy=0;}
      // Land on ground only if over a segment (falls in pits!)
      else if(overSeg(sh,L)&&sh.y+sh.h>=L.groundY){sh.y=L.groundY-sh.h;sh.vy=0;}
      sh.x+=sh.vx;
      // Bounce off world edges only
      if(sh.x<=0){sh.x=0;sh.vx=Math.abs(sh.vx);}
      if(sh.x+sh.w>=L.worldW){sh.x=L.worldW-sh.w;sh.vx=-Math.abs(sh.vx);}
      // Remove if fallen into pit
      if(sh.y>L.groundY+60){shells.splice(i,1);continue;}
      // Shell kills enemies
      for(const en of enemies){
        if(!en.alive||en.type==='shell')continue;
        const sox=!(p.x+p.w<=en.x||p.x>=en.x+en.w||sh.y+sh.h<=en.y||sh.y>=en.y+en.h);
        if(!(sh.x+sh.w<=en.x||sh.x>=en.x+en.w||sh.y+sh.h<=en.y||sh.y>=en.y+en.h)){
          en.alive=false;en.dt=0;
          snd('stomp');burst(en.x+en.w/2,en.y+en.h/2,'#4CAF50',12,true);
        }
      }
      // Shell kills player if running into it and not kicked
    }
    // Player can kick a stationary shell
    const spx=!(p.x+p.w<=sh.x||p.x>=sh.x+sh.w||p.y+p.h<=sh.y||p.y>=sh.y+sh.h);
    if(spx&&!sh.kicked){
      sh.kicked=true;sh.vx=(p.x<sh.x?4.2:-4.2);sh.vy=0.5;
      snd('stomp');addShake(2);
    } else if(spx&&sh.kicked&&p.inv===0){
      if(p.halfDmg){p.hearts=Math.max(p.hearts-.5,0);p.halfDmg=false;}
      else p.hearts--;
      snd('hurt');addShake(5);p.vx=p.dir<0?2.5:-2.5;p.vy=-3;
      burst(p.x+p.w/2,p.y+p.h/2,'#ff4444',10,true);
      if(p.hearts<=0){startDying(true);return;}
      p.inv=180;
    }
    // Remove shell if off screen
    if(sh.x<-20||sh.x>L.worldW+20)shells.splice(i,1);
  }

  // Pit death
  if(!p.gnd&&!rideMplat(p)&&!overSeg(p,L)&&p.y+p.h>L.groundY+12){startDying(false);return;}
  if(p.y>GH+60){startDying(false);return;}

  // Enemies
  enemies.forEach(en=>{
    if(!en.alive){en.dt++;return;}
    applyPhys(en,L,false);en.wf++;
    let flip=en.x<=2||en.x+en.w>=L.worldW-2;
    if(!flip&&en.gnd){
      let onPlat=false;
      for(const pt of L.platforms){
        if(en.x+en.w>pt.x&&en.x<pt.x+pt.w&&Math.abs(en.y+en.h-pt.y)<4){
          onPlat=true;
          const ax=en.vx>0?en.x+en.w+5:en.x-5;
          if(ax<pt.x||ax>pt.x+pt.w)flip=true;break;
        }
      }
      if(!onPlat){
        const cx=en.vx>0?en.x+en.w+7:en.x-7;
        if(!L.segs.some(sg=>cx>sg.x&&cx<sg.x+sg.w))flip=true;
      }
    }
    if(flip)en.vx*=-1;
    if(p.inv>0)return;
    const ox=!(p.x+p.w<=en.x||p.x>=en.x+en.w||p.y+p.h<=en.y||p.y>=en.y+en.h);
    if(ox){
      if(p.vy>0&&p.y+p.h<=en.y+en.h*.55){
        // Stomp!
        if(en.type==='koopa'){
          // Koopa becomes a shell
          en.type='shell';en.vx=0;en.vy=0;en.dt=0;
          p.vy=-5;snd('stomp');addShake(3);
          addScore(100);
          burst(en.x+en.w/2,en.y+en.h/2,'#FFD700',10,true);
          // Spawn shell — small initial vy so it immediately starts gravity
          shells.push({x:en.x,y:en.y,w:en.w,h:en.h,vx:0,vy:0.5,kicked:false});
          en.alive=false;en.dt=0;
        } else {
          en.alive=false;en.dt=0;p.vy=-5;
          snd('stomp');addShake(3);
          burst(en.x+en.w/2,en.y+en.h/2,'#4CAF50',16,true);
        }
      } else {
        if(p.halfDmg){p.hearts=Math.max(p.hearts-.5,0);p.halfDmg=false;}else p.hearts--;
        snd('hurt');addShake(5);p.vx=p.dir<0?2.5:-2.5;p.vy=-3;
        burst(p.x+p.w/2,p.y+p.h/2,'#ff4444',12,true);
        if(p.hearts<=0){startDying(true);return;}
        p.inv=180;
      }
    }
  });

  // Boss (Royale W2)
  if(bossObj&&bossObj.alive){
    // Movement
    bossObj.x+=bossObj.vx;
    if(bossObj.x<=GW-280||bossObj.x+bossObj.w>=L.worldW-60)bossObj.vx*=-1;
    if(bossObj.inv>0)bossObj.inv--;
    // Fire candles
    bossObj.fireTimer++;
    if(bossObj.fireTimer>=160){
      bossObj.fireTimer=0;
      const dir=p.x>bossObj.x?1:-1;
      bossCandles.push({x:bossObj.x+bossObj.w/2,y:bossObj.y,vx:dir*1.2,vy:-3,alive:true});
      snd('laser');
    }
    // Stomp boss
    if(p.inv===0){
      const bx=bossObj;
      const ox=!(p.x+p.w<=bx.x||p.x>=bx.x+bx.w||p.y+p.h<=bx.y||p.y>=bx.y+bx.h);
      if(ox){
        if(p.vy>0&&p.y+p.h<=bx.y+12&&bx.inv===0){
          bx.hp--;bx.inv=60;p.vy=-6;
          snd('boss');burst(bx.x+bx.w/2,bx.y,'#FF88BB',18,true);
          if(bx.hp<=0){
            bx.alive=false;
            burst(bx.x+bx.w/2,bx.y+bx.h/2,'#FFD700',30,true);
            burst(bx.x+bx.w/2,bx.y,'#FF88BB',20,true);
            snd('clear');giftsFound++;showMsg(LDATA[lvlI].gi);
          }
        } else if(p.inv===0&&bx.inv===0){
          p.hearts--;snd('hurt');p.vx=p.dir<0?2.5:-2.5;p.vy=-3;
          burst(p.x+p.w/2,p.y+p.h/2,'#ff4444',12,true);
          if(p.hearts<=0){startDying(true);return;}
          p.inv=180;
        }
      }
    }
    // Update candles
    for(let i=bossCandles.length-1;i>=0;i--){
      const c=bossCandles[i];c.x+=c.vx;c.y+=c.vy;c.vy+=.12;
      if(c.y>L.groundY+10||c.x<0||c.x>L.worldW){bossCandles.splice(i,1);continue;}
      if(p.inv===0&&Math.abs(c.x-p.x-p.w/2)<10&&Math.abs(c.y-p.y-p.h/2)<10){
        bossCandles.splice(i,1);
        p.hearts--;snd('hurt');p.vx=p.dir<0?2.5:-2.5;p.vy=-3;
        burst(c.x,c.y,'#FF8800',8,true);
        if(p.hearts<=0){startDying(true);return;}
        p.inv=180;
      }
    }
    // Boss defeated: unlock exit after modal closed
    if(!bossObj.alive&&!bossObj.exitUnlocked&&!modalOpen){
      bossObj.exitUnlocked=true;portalOpen=true;
    }
  }

  // Ground gifts
  gifts&&gifts.forEach(g=>{
    if(g.got)return;
    const ox=!(p.x+p.w<g.x||p.x>g.x+16||p.y+p.h<g.y||p.y>g.y+16);
    if(ox){g.got=true;giftsFound++;snd('gift');burst(g.x+8,g.y,'#FFD700',22,false);burst(g.x+8,g.y,'#FF88BB',8,false);showMsg(g.gi);if(giftsFound>=totalGifts())portalOpen=true;}
  });

  // Coin collection — pitched jingle per coin
  coins&&coins.forEach(c=>{
    if(c.got)return;
    if(!(p.x+p.w<c.x||p.x>c.x+10||p.y+p.h<c.y-2||p.y>c.y+10)){
      c.got=true;addScore(100);playCoin();
      burst(c.x+5,c.y,'#FFD700',6,false);
    }
  });

  // Flag portal
  if(portalOpen&&L.flag&&!L._flagTriggered){
    const fx=L.flag.x;
    const nearFlag=p.x+p.w>fx-20&&p.x<fx+44&&p.y+p.h>L.groundY-80&&p.y<L.groundY;
    if(nearFlag){L._flagTriggered=true;snd('clear');nextLevel();}
  }
  // Boss level end (no flag)
  if(portalOpen&&!L.flag&&bossObj&&!bossObj.alive&&!modalOpen&&!bossObj.exitDone){
    if(p.x>L.worldW-100){bossObj.exitDone=true;snd('clear');nextLevel();}
  }

  camX+=(p.x-GW/2+p.w/2-camX)*.1;
  camX=Math.max(0,Math.min(camX,L.worldW-GW));
}

// ── CI UPDATE ────────────────────────────────────────────────
function updateCI(L){
  updParts();
  const p=player;if(p.inv>0)p.inv--;
  // Ship movement (left/right only)
  if(goL())p.x=Math.max(8,p.x-2.4);
  if(goR())p.x=Math.min(GW-24,p.x+2.4);

  // MANUAL FIRE ONLY — player must press Space/Up to shoot (edge detection)
  const firePressedNow=doJ();
  if(firePressedNow&&!ciPrevFire&&ciFireTimer<=0){
    ciFireTimer=18;// cooldown between shots
    ciBullets.push({x:p.x+p.w/2-1,y:p.y-2,vy:-8});
    snd('laser');
  }
  ciPrevFire=firePressedNow;
  if(ciFireTimer>0)ciFireTimer--;

  // Bullets
  for(let i=ciBullets.length-1;i>=0;i--){
    ciBullets[i].y+=ciBullets[i].vy;
    if(ciBullets[i].y<-6)ciBullets.splice(i,1);
  }

  // Eggs — FIXED: slower speed and gentler gravity
  for(let i=ciEggs.length-1;i>=0;i--){
    const eg=ciEggs[i];
    eg.y+=eg.vy;eg.vy=Math.min(eg.vy+.022,2.8);// gentle gravity, capped speed
    if(eg.vx)eg.x+=eg.vx; // boss eggs have horizontal drift
    if(eg.y>GH+10){ciEggs.splice(i,1);continue;}
    if(p.inv===0&&Math.abs(eg.x-(p.x+p.w/2))<10&&eg.y+8>p.y&&eg.y<p.y+p.h){
      ciEggs.splice(i,1);
      p.hearts--;snd('hurt');p.inv=180;
      burst(p.x+p.w/2,p.y,'#ff4444',10,true);
      if(p.hearts<=0){startDying(true);return;}
    }
  }

  // Regular chickens formation — FIXED: much slower movement
  const alive=ciChickens.filter(c=>c.alive);
  const lm=alive.length?Math.min(...alive.map(c=>c.x)):GW/2;
  const rm=alive.length?Math.max(...alive.map(c=>c.x+18)):GW/2;
  if(rm>=GW-8&&ciFormDir>0){ciFormDir=-1;alive.forEach(c=>c.y+=6);}
  if(lm<=8&&ciFormDir<0){ciFormDir=1;alive.forEach(c=>c.y+=6);}
  alive.forEach(c=>c.x+=ciFormDir*L.formSpd);

  // Egg drop from regular chickens
  if(Math.random()<1/(L.eggRate)&&alive.length>0){
    const d=alive[Math.floor(Math.random()*alive.length)];
    ciEggs.push({x:d.x+9,y:d.y+16,vy:.45+Math.random()*.3});// FIXED: slow start
  }

  // Bullet-chicken collision
  for(let bi=ciBullets.length-1;bi>=0;bi--){
    const b=ciBullets[bi];let hit=false;
    for(let ci2=0;ci2<ciChickens.length;ci2++){
      const ch=ciChickens[ci2];if(!ch.alive)continue;
      if(b.x>ch.x&&b.x<ch.x+18&&b.y>ch.y&&b.y<ch.y+16){
        ch.alive=false;ch.dt=0;hit=true;
        snd('stomp');burst(ch.x+9,ch.y+8,'#FFAA00',14,true);
        if(ch.hasGift){giftsFound++;showMsg(L.gi);}
        break;
      }
    }
    if(hit)ciBullets.splice(bi,1);
  }

  // Update dead chicken timers
  ciChickens.forEach(ch=>{if(!ch.alive)ch.dt++;});

  // Chicken reaches bottom — LOSE HEART, reset formation, don't die instantly
  if(alive.some(c=>c.y+16>GH-26)){
    p.hearts--;snd('hurt');p.inv=180;burst(p.x+p.w/2,p.y,'#ff4444',12,true);
    if(p.hearts<=0){startDying(false);return;}
    // Reset formation to top
    const nc=L.cols||4;
    alive.forEach((c,idx)=>{c.y=16+Math.floor(idx/nc)*22;});
  }

  // Boss Chicken update (level 2 only)
  if(ciBoss&&ciBoss.alive){
    ciBoss.x+=ciBoss.vx;
    if(ciBoss.x<=4||ciBoss.x+ciBoss.w>=GW-4)ciBoss.vx*=-1;
    if(ciBoss.inv>0)ciBoss.inv--;
    // Boss fires eggs more aggressively
    ciBoss.fireTimer++;
    const bossFireRate=Math.max(40,90-ciBoss.hp*8);// faster as HP drops
    if(ciBoss.fireTimer>=bossFireRate){
      ciBoss.fireTimer=0;
      // Fire 1-3 eggs in spread
      const spread=ciBoss.hp<=3?3:ciBoss.hp<=5?2:1;
      for(let k=0;k<spread;k++){
        const ang=(k-(spread-1)/2)*.25;
        ciEggs.push({x:ciBoss.x+ciBoss.w/2,y:ciBoss.y+ciBoss.h,
          vy:.5+Math.random()*.2,vx:Math.sin(ang)*1.2,boss:true});
      }
      snd('hurt');
    }
    // Boss hit by bullet
    for(let bi=ciBullets.length-1;bi>=0;bi--){
      const b=ciBullets[bi];
      if(b.x>ciBoss.x&&b.x<ciBoss.x+ciBoss.w&&b.y>ciBoss.y&&b.y<ciBoss.y+ciBoss.h&&ciBoss.inv===0){
        ciBullets.splice(bi,1);
        ciBoss.hp--;ciBoss.inv=30;
        snd('boss');burst(ciBoss.x+ciBoss.w/2,ciBoss.y+10,'#FF88BB',12,true);
        if(ciBoss.hp<=0){
          ciBoss.alive=false;
          burst(ciBoss.x+ciBoss.w/2,ciBoss.y+ciBoss.h/2,'#FFD700',30,true);
          burst(ciBoss.x+ciBoss.w/2,ciBoss.y,'#FF88BB',20,true);
          snd('clear');giftsFound++;showMsg(L.gi);
          break;
        }
      }
    }
    // Boss touch player
    if(p.inv===0&&ciBoss.inv===0&&
       p.x<ciBoss.x+ciBoss.w&&p.x+p.w>ciBoss.x&&
       p.y<ciBoss.y+ciBoss.h&&p.y+p.h>ciBoss.y){
      p.hearts--;snd('hurt');p.inv=180;burst(p.x+p.w/2,p.y,'#ff4444',10,true);
      if(p.hearts<=0){startDying(true);return;}
    }
    // Level ends when boss is dead and gift collected and modal closed
    if(!ciBoss.alive&&giftsFound>0&&!modalOpen&&!ciBoss.exitDone){
      ciBoss.exitDone=true;nextLevel();return;
    }
  } else if(ciBoss&&!ciBoss.alive){
    if(giftsFound>0&&!modalOpen&&!ciBoss.exitDone){
      ciBoss.exitDone=true;nextLevel();return;
    }
  } else if(!ciBoss){
    // No boss: end when all chickens cleared
    if(alive.length===0){
      if(L.clearGift&&giftsFound===0){
        giftsFound++;showMsg(L.gi);
        return;
      }
      if(!modalOpen&&!L._endTriggered){L._endTriggered=true;snd('clear');nextLevel();return;}
    }
  }

}

// ── DASH UPDATE ───────────────────────────────────────────────
const DGY=144,DPX=60;
function updateDash(L){
  updParts();
  dashOff+=L.spd;
  dashVy=Math.min(dashVy+.38,8);dashY+=dashVy;dashGnd=false;
  // Check block landings
  for(const o of dashObs){
    if(o.t==='blk'&&!o.got){
      const ox=o.x-dashOff;
      if(ox+o.w>DPX+2&&ox<DPX+12&&dashY+14>=o.y&&dashY+14<=o.y+8&&dashVy>=0){
        dashY=o.y-14;dashVy=0;dashGnd=true;dashJC=0;break;
      }
    }
  }
  // Ground (check for gaps)
  if(!dashGnd){
    let inGap=false;
    for(const o of dashObs){
      if(o.t==='gap'){const ox=o.x-dashOff;if(ox<DPX+10&&ox+o.w>DPX+2){inGap=true;break;}}
    }
    if(!inGap&&dashY+14>=DGY){dashY=DGY-14;dashVy=0;dashGnd=true;dashJC=0;}
  }
  // Jump
  if(doJ()&&!dashPrevJ&&dashJC<2){dashVy=-6.5;dashJC++;snd('jump');burst(DPX+6,dashY+14,'#88FFFF',6,false);}
  dashPrevJ=doJ();
  // Checkpoint — save progress at halfway point
  const midX=L.obs[Math.floor(L.obs.length/2)].x;
  if(dashOff>midX&&dashCheckpt===0)dashCheckpt=dashOff;
  // Check obstacles
  for(const o of dashObs){
    const ox=o.x-dashOff;
    if(ox>DPX+14||ox+20<DPX)continue;
    if(o.t==='spk'){
      if(ox<DPX+10&&ox+12>DPX+2&&dashY+12>=DGY-8&&dashY+4<=DGY){
        startDying(true);return;
      }
    }
    if(o.t==='gift'&&!o.got&&L.gi!=null&&ox>DPX-18&&ox<DPX+20&&dashY<o.y+22&&dashY+14>o.y-8){
      o.got=true;giftsFound++;snd('gift');
      burst(DPX+6,dashY,'#FFD700',20,false);showMsg(L.gi);portalOpen=true;
    }
    if(o.t==='end'&&(portalOpen||L.gi==null)&&!modalOpen&&ox<DPX+14&&!L._endTriggered){
      L._endTriggered=true;snd('clear');nextLevel();return;
    }
  }
  if(dashY>GH+40)startDying(false);
  player.y=dashY; // sync for HUD
}

// ── LEVEL PROGRESSION ────────────────────────────────────────
function nextLevel(){
  startWipe(()=>{
    const L=LDATA[lvlI];
    const W=WORLDS[L.worldI];
    lvlI++;
    if(lvlI>W.lvlEnd){
      worldDone[L.worldI]=true;
      saveStars(L.worldI,calcStars());
      stopMusic();
      gs='wclear';
      if(worldDone.every(d=>d))gs='win';
    } else {
      initLevel(lvlI);gs='intro';introTimer=0;
    }
    coinsPitched=0;
  });
}

// ── MODAL ────────────────────────────────────────────────────
function showMsg(gi){
  if(gi==null)return;
  FW._prevGs=gs; // save for restore
  gs='msg';modalOpen=true;
  const m=MSGS[gi];
  document.getElementById('mtitle').textContent=m.title;
  document.getElementById('mmsg').textContent=m.msg;
  document.getElementById('modal').classList.add('on');
}
function closeMsg(){
  document.getElementById('modal').classList.remove('on');
  modalOpen=false;
  // Restore previous state — but only if it was 'play' or 'dying'
  // (never restore 'msg' itself in case of double-call)
  gs=(FW._prevGs==='play'||FW._prevGs==='dying')?FW._prevGs:'play';
}

// ── DRAW HELPERS ─────────────────────────────────────────────
function glow(col,blur){ctx.shadowColor=col;ctx.shadowBlur=s(blur);}

// ── DRAW SPRITES ─────────────────────────────────────────────
function drawSprite(ox,oy,dir,wf,gnd,inv,tint){

  const leg=moving?Math.sin(wf*.28)*2.8:0;
  const arm=moving?-Math.sin(wf*.28)*3.0:(oy<0?-4:0);
  ctx.save();
  if(fl){ctx.translate(s(ox+7),0);ctx.scale(-1,1);ctx.translate(-s(ox+7),0);}
  // Ground shadow
  ctx.globalAlpha=.18;ctx.fillStyle='#000';
  const sw=10+Math.abs(bob)*2;
  ctx.fillRect(s(ox+1),s(oy+17),s(sw),s(2));

  // Legs
  ctx.fillStyle='#1833BB';ctx.fillRect(s(ox),s(oy+10+bob+leg),s(5),s(7));
  ctx.fillStyle='#102090';ctx.fillRect(s(ox+1),s(oy+10+bob+leg),s(2),s(7));

  ctx.fillStyle='#2A1000';ctx.fillRect(s(ox-1),s(oy+14+bob+leg),s(7),s(3));
  ctx.fillStyle='#3D1C02';ctx.fillRect(s(ox+5),s(oy+14+bob-leg),s(7),s(3));
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(s(ox-1),s(oy+14+bob+leg),s(7),s(1));
  ctx.fillRect(s(ox+5),s(oy+14+bob-leg),s(7),s(1));
  // Overalls
  ctx.fillStyle='#3B7AFF';ctx.fillRect(s(ox),s(oy+7+bob),s(12),s(5));
  ctx.fillStyle='#2255DD';ctx.fillRect(s(ox),s(oy+10+bob),s(12),s(2));
  ctx.fillStyle='#4488FF';ctx.fillRect(s(ox),s(oy+7+bob),s(12),s(1));
  // Bib
  ctx.fillStyle='#4488FF';ctx.fillRect(s(ox+2),s(oy+5+bob),s(4),s(4));ctx.fillRect(s(ox+6),s(oy+5+bob),s(4),s(4));
  ctx.fillStyle='#88AAFF';ctx.fillRect(s(ox+2),s(oy+5+bob),s(4),s(1));ctx.fillRect(s(ox+6),s(oy+5+bob),s(4),s(1));
  // Shirt
  const shirtC=tint==='gun'?'#1144CC':tint==='shield'?'#CC6600':tint==='djump'?'#008866':'#D42030';
  ctx.fillStyle=shirtC;ctx.fillRect(s(ox),s(oy+3+bob),s(12),s(5));
  ctx.fillStyle=tint==='gun'?'#4466EE':tint==='shield'?'#EE8800':tint==='djump'?'#00AACC':'#FF4455';ctx.fillRect(s(ox),s(oy+3+bob),s(12),s(1));
  ctx.fillStyle='#A01020';ctx.fillRect(s(ox),s(oy+6+bob),s(12),s(1));
  // Head
  ctx.fillStyle='#FFCC99';ctx.fillRect(s(ox+1),s(oy+bob),s(10),s(8));
  ctx.fillStyle='#FFAA77';ctx.fillRect(s(ox+1),s(oy+5+bob),s(10),s(3));
  // Cap brim + top
  ctx.fillStyle='#D42030';ctx.fillRect(s(ox-1),s(oy-2+bob),s(14),s(2));
  ctx.fillStyle='#E63040';ctx.fillRect(s(ox),s(oy-5+bob),s(12),s(4));
  ctx.fillStyle='#FF5566';ctx.fillRect(s(ox),s(oy-5+bob),s(12),s(1));
  ctx.fillStyle='#A01020';ctx.fillRect(s(ox),s(oy-3+bob),s(12),s(1));
  // Eyes
  ctx.fillStyle='#2A1000';ctx.fillRect(s(ox+3),s(oy+1+bob),s(2),s(3));ctx.fillRect(s(ox+7),s(oy+1+bob),s(2),s(3));
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect(s(ox+3),s(oy+1+bob),s(1),s(1));ctx.fillRect(s(ox+7),s(oy+1+bob),s(1),s(1));
  // Nose + moustache
  ctx.fillStyle='#CC8860';ctx.fillRect(s(ox+5),s(oy+3+bob),s(2),s(2));

function drPlayer(){
  const p=player,L=LDATA[lvlI];
  if(gs==='dying'){
    const cx=s(p.x+p.w/2-(L.type==='ci'||L.type==='dash'?0:camX));
    const cy=s(p.y+p.h/2);
    ctx.save();ctx.translate(cx,cy);ctx.rotate(p.dRot);ctx.translate(-s(6),-s(8));
    if(L.type==='ci')drShip(0,0,0);
    else if(L.type==='dash')drDashCube(0,0,0);
    else drawSprite(0,0,p.dir,0,false,0);
    ctx.restore();return;
  }
  if(L.type==='mario'||L.type==='royale')drawSprite(p.x-camX,p.y,p.dir,p.wf,p.gnd,p.inv);
  else if(L.type==='ci')drShip(p.x,p.y,p.inv);
  else if(L.type==='dash')drDashCube(DPX,dashY,p.inv);
}

function drShip(ox,oy,inv){
  if(inv>0&&Math.floor(inv/5)%2===1)return;
  // Exhaust
  const ex=['#FF4400','#FF8800','#FFCC00'];
  for(let i=0;i<3;i++){
    const fw=Math.floor(frame*.5+i)%2;
    ctx.globalAlpha=.7-i*.2;ctx.fillStyle=ex[i];
    ctx.fillRect(s(ox+3+i*1),s(oy+13+fw+i*2),s(4-i),s(4+fw));
    ctx.fillRect(s(ox+9+i*1),s(oy+13+fw+i*2),s(4-i),s(4+fw));
  }ctx.globalAlpha=1;
  // Hull - 3D effect
  ctx.fillStyle='#00CCAA';ctx.fillRect(s(ox+5),s(oy),s(6),s(4));
  ctx.fillStyle='#00FFCC';ctx.fillRect(s(ox+4),s(oy+3),s(8),s(4));
  ctx.fillStyle='#44FFDD';ctx.fillRect(s(ox+3),s(oy+6),s(10),s(4));
  ctx.fillStyle='#00FFCC';ctx.fillRect(s(ox+1),s(oy+9),s(14),s(4));
  // Wings
  ctx.fillStyle='#007A66';ctx.fillRect(s(ox),s(oy+8),s(3),s(5));ctx.fillRect(s(ox+13),s(oy+8),s(3),s(5));
  ctx.fillStyle='#00AA88';ctx.fillRect(s(ox-2),s(oy+9),s(3),s(3));ctx.fillRect(s(ox+15),s(oy+9),s(3),s(3));
  // Cockpit glass
  ctx.fillStyle='rgba(0,255,200,.35)';ctx.fillRect(s(ox+5),s(oy+3),s(6),s(5));
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(s(ox+5),s(oy+3),s(2),s(2));
  // Top highlight
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(s(ox+4),s(oy+3),s(8),s(1));
  // Glow
  glow('#00FFCC',6);ctx.fillStyle='rgba(0,255,200,.0)';ctx.fillRect(s(ox),s(oy),s(16),s(14));noGlow();
}

function drDashCube(ox,oy,inv){
  if(inv>0&&Math.floor(inv/5)%2===1)return;
  const rot=(dashOff*.06)%(Math.PI*2);
  const colors=[['#FF44FF','#CC00CC','#FF88FF'],['#8844FF','#5500CC','#AA88FF'],['#44AAFF','#0066CC','#88CCFF']];
  const ci=Math.floor(dashOff/200)%3;
  const [cm,cd,cl]=colors[ci];
  // Trail
  for(let t=1;t<=4;t++){
    ctx.globalAlpha=(.35-t*.07);ctx.fillStyle=cm;
    ctx.fillRect(s(ox-t*5),s(oy+2),s(10),s(8));
  }ctx.globalAlpha=1;
  ctx.save();ctx.translate(s(ox+6),s(oy+6));ctx.rotate(rot);
  // 3D cube effect - draw top/side faces
  ctx.fillStyle=cm;ctx.fillRect(s(-6),s(-6),s(12),s(12));
  // Darker side face (right)
  ctx.fillStyle=cd;ctx.fillRect(s(4),s(-6),s(2),s(12));
  // Lighter top face
  ctx.fillStyle=cl;ctx.fillRect(s(-6),s(-6),s(12),s(2));
  // Shine
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.fillRect(s(-6),s(-6),s(4),s(2));ctx.fillRect(s(-6),s(-6),s(2),s(4));
  // Inner cross
  ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(s(-1),s(-6),s(2),s(12));ctx.fillRect(s(-6),s(-1),s(12),s(2));
  ctx.restore();
  glow(cm,10);ctx.fillStyle='rgba(0,0,0,0)';ctx.fillRect(s(ox),s(oy),s(12),s(12));noGlow();
}

  // Feet
  ctx.fillStyle='#FF8C00';ctx.fillRect(s(cx+4),s(by+15),s(3),s(3));ctx.fillRect(s(cx+11),s(by+15),s(3),s(3));

  if(hasGift){
    glow('#FFD700',5);
    r(cx+5,by-8,8,8,'#E63946',false);r(cx+5,by-5,8,3,'rgba(0,0,0,.08)',false);
    r(cx+5,by-5,8,2,'#FFD700',false);r(cx+8,by-8,2,8,'#FFD700',false);

}

function drGoomba(en){
  if(!en.alive){
    if(en.dt<22){ctx.globalAlpha=1-en.dt/22;ctx.fillStyle='#C84B13';ctx.fillRect(s(en.x+1-camX),s(en.y+en.h-4*(1-en.dt/22)),s(en.w-2),s(4*(1-en.dt/22)));ctx.globalAlpha=1;}return;
  }
  const bx=en.x-camX,bob=Math.sin(frame*.1+en.x*.01)*1.2,by=en.y+bob,fl=en.vx>0;
  const ww=en.gnd?Math.sin(en.wf*.3)*1.5:0;
  // Shadow
  ctx.globalAlpha=.15;ctx.fillStyle='#000';ctx.fillRect(s(bx+1),s(by+en.h),s(en.w-2),s(2));ctx.globalAlpha=1;

// ── UPDATE FINAL WORLD ────────────────────────────────────────
let fwPaused=false;
function updateFinal(){
  // Pause toggle
  if(fwPaused)return;

  FW.timer++;
  // Frame-based fade — fade TO black (dir=1), switch phase at top, fade back OUT (dir=-1)
  if(FW.fadeDir!==0){
    FW.fade+=FW.fadeDir*0.025;
    // Fully BLACK — switch phase now, then fade back out
    if(FW.fade>=1&&FW.fadeDir>0){
      FW.fade=1;FW.fadeDir=0;
      if(FW.pendingPhase!=null){
        const p=FW.pendingPhase;FW.pendingPhase=null;
        FW.phase=p;FW.timer=0;FW.step=0;
        FW.rushTimer=0;FW.rushDone=false;
        FW.rushMsgT=0;// clear any lingering result message
        FW.rushMsg='';// clear message text too
        if(p===1)initPuzzle(0);
        if(p===2){FW.mr_off=0;FW.mr_y=126;FW.mr_vy=0;FW.mr_gnd=true;FW.mr_wf=0;FW.mr_coyote=0;FW.mr_jbuf=0;FW.mr_jp=false;}
        FW.storyTimer=300;// story card ticks in updateFinal
        setTimeout(()=>{FW.fadeDir=-1;},350);// brief hold at black then fade out
      }
    }
    // Fully CLEAR — stop fading, clear transition message
    if(FW.fade<=0&&FW.fadeDir<0){FW.fade=0;FW.fadeDir=0;FW.transMsg='';}
  }

  // Story card — handled in draw (skippable), just pause gameplay
  if(FW.storyTimer>0){
    FW.storyTimer--;
    // Skip on any key press
    if((doJ()||K.Space||K.ArrowUp||goL()||goR())&&FW.storyTimer>12)FW.storyTimer=12;
    // When phase 0 story ends, trigger rush intro
    if(FW.storyTimer<=0&&FW.phase===0&&FW.rushIntro===0)FW.rushIntro=210;
    return;
  }

  if(FW.phase===0) updateRush();
  else if(FW.phase===1) updatePuzzle();
  else if(FW.phase===2) updateMemory();
  else if(FW.phase===3) updateEnding();
}

function transitionTo(phase,msg){
  if(FW.pendingPhase!=null)return;// already transitioning
  FW.transMsg=msg;FW.pendingPhase=phase;FW.fadeDir=1;
}

function updateRush(){
  FW.rushTimer++;

  if(FW.rushIntro>0){FW.rushIntro--;return;}
  const ri=FW.rushIdx;
  const RUSH_GAMES=[updateSpike,updateQShoot,updatePJump,updateReact];
  if(ri<RUSH_GAMES.length) RUSH_GAMES[ri]();
}

function nextRush(msg){
  FW.rushMsg=msg;FW.rushMsgT=0;// NO delay — transition immediately
  FW.rushIdx++;FW.rushTimer=0;
  if(FW.rushIdx<RUSH_NAMES.length){
    FW.rushIntro=210;
    FW.rushName=RUSH_NAMES[FW.rushIdx];
    FW.rushHint=RUSH_HINTS[FW.rushIdx];
  }

  if(FW.rushIdx>=4){
    transitionTo(1,'Mini-games complete!\n\nThree puzzles await.\nUse your head.');

// Mini-game 1: Spike Dodge — slow and forgiving
function updateSpike(){
  const p=FW.spikeP;
  // Spawn spikes — slow start, gradual increase
  const spawnRate=Math.max(55-Math.floor(FW.rushTimer/100)*8,28);
  if(FW.rushTimer%spawnRate===0&&FW.rushTimer<770){
    FW.spikes.push({x:Math.random()*(GW-30)+15,y:-10,vy:1.0+Math.random()*.8});
  }
  // Move spikes
  for(let i=FW.spikes.length-1;i>=0;i--){
    FW.spikes[i].y+=FW.spikes[i].vy;
    if(FW.spikes[i].y>GH)FW.spikes.splice(i,1);
    else if(Math.abs(FW.spikes[i].x-(p.x+6))<9&&FW.spikes[i].y+12>130&&FW.spikes[i].y<145&&p.inv===0){
      FW.spikes.splice(i,1);
      p.hearts=Math.max(0,p.hearts-1);p.inv=60;addShake(3);snd('hurt');
      burst(p.x+6,130,'#ff4444',8,true);
    }
  }
  if(p.inv>0)p.inv--;
  // Move player
  if(goL())p.x=Math.max(6,p.x-2.8);
  if(goR())p.x=Math.min(GW-18,p.x+2.8);
  if(FW.rushTimer>=800||p.hearts<=0) nextRush('Quick reflexes...');
}

// Mini-game 2: Quick Shoot (5 chickens, edge-fire)
function updateQShoot(){
  if(FW.qs_fireCD>0)FW.qs_fireCD--;
  // Ship at bottom center, move l/r
  if(!FW.qs_ship)FW.qs_ship={x:GW/2-8,y:GH-30};
  const sh=FW.qs_ship;
  if(goL())sh.x=Math.max(8,sh.x-2.4);
  if(goR())sh.x=Math.min(GW-24,sh.x+2.4);
  // Manual fire
  if(doJ()&&!FW.qs_prevJ&&FW.qs_fireCD<=0){
    FW.qs_bullets.push({x:sh.x+7,y:sh.y-2,vy:-8});
    FW.qs_fireCD=18;snd('laser');
  }
  FW.qs_prevJ=doJ();
  // Move bullets
  for(let i=FW.qs_bullets.length-1;i>=0;i--){
    FW.qs_bullets[i].y+=FW.qs_bullets[i].vy;
    if(FW.qs_bullets[i].y<-6){FW.qs_bullets.splice(i,1);continue;}
    // Hit chickens
    for(const ch of FW.qs_chickens){
      if(!ch.alive)continue;
      if(Math.abs(FW.qs_bullets[i].x-ch.x-9)<12&&Math.abs(FW.qs_bullets[i].y-ch.y-8)<12){
        ch.alive=false;snd('stomp');burst(ch.x+9,ch.y+8,'#FFAA00',12,true);
        FW.qs_bullets.splice(i,1);break;
      }
    }
  }
  FW.qs_chickens.forEach(c=>{if(!c.alive)c.dt++;});
  const allDead=FW.qs_chickens.every(c=>!c.alive);
  if(allDead||FW.rushTimer>700) nextRush('...sharp aim...');
}

// Mini-game 3: Platform jump — easy wide platforms, no frustration
function updatePJump(){
  const plats=[{x:0,y:140,w:100},{x:116,y:126,w:80},{x:210,y:112,w:80},{x:300,y:126,w:80},{x:GW-100,y:134,w:100}];
  FW.pj_vy=Math.min(FW.pj_vy+0.38,8); FW.pj_y+=FW.pj_vy; FW.pj_gnd=false;
  for(const p of plats){
    if(FW.pj_vy>=0&&FW.pj_y+16>=p.y&&FW.pj_y+16<=p.y+10&&FW.pj_x+10>p.x&&FW.pj_x+2<p.x+p.w){
      FW.pj_y=p.y-16;FW.pj_vy=0;FW.pj_gnd=true;FW.pj_coyote=8;
    }
  }
  if(FW.pj_gnd)FW.pj_coyote=8;else if(FW.pj_coyote>0)FW.pj_coyote--;
  if(doJ()&&!FW.pj_prevJ)FW.pj_jbuf=10;else if(FW.pj_jbuf>0)FW.pj_jbuf--;
  FW.pj_prevJ=doJ();
  if(FW.pj_jbuf>0&&FW.pj_coyote>0&&!FW.pj_jp){
    FW.pj_vy=-7;FW.pj_jp=true;FW.pj_coyote=0;FW.pj_jbuf=0;snd('jump');
    burst(FW.pj_x+6,FW.pj_y+16,'#fff',5,false);
  }
  if(!doJ())FW.pj_jp=false;
  if(goR())FW.pj_x=Math.min(GW-14,FW.pj_x+2.4);
  if(goL())FW.pj_x=Math.max(0,FW.pj_x-2.4);
  if(FW.pj_y>GH){FW.pj_y=126;FW.pj_vy=0;}// gentle respawn, no death
  if(FW.pj_x>=GW-105||FW.rushTimer>1100) nextRush('...perfect timing...');
}

// Mini-game 4: Reaction test — generous window, fast advance after result
function updateReact(){
  if(FW.rt_state===0){
    FW.rt_wait--;
    if(FW.rt_wait<=0){FW.rt_state=1;FW.rt_time=0;}
  } else if(FW.rt_state===1){
    FW.rt_time++;
    const pressed=doJ()||(K.Space||K.ArrowUp);
    if(pressed&&!FW.rt_prevJ){
      FW.rt_score=FW.rt_time;
      FW.rt_state=2;snd('coin');burst(GW/2,GH/2,'#00FF88',16,true);
    }
    if(FW.rt_time>240){FW.rt_score=240;FW.rt_state=2;}
  } else if(FW.rt_state===2){
    if(FW.rushTimer>600) nextRush('...and focus.');// faster advance
  }
  FW.rt_prevJ=doJ()||(K.Space||K.ArrowUp);
}

// ── PHASE 2: PUZZLES ──────────────────────────────────────────
function updatePuzzle(){
  const pz=FW.pz;
  if(!pz)return;
  if(pz.clearTimer>0){
    pz.clearTimer--;
    if(pz.clearTimer<=0){
      FW.pz_idx++;
      if(FW.pz_idx>=4){
        transitionTo(2,'All puzzles solved!\n\nThe path ahead is open.\nNo more fighting.\nJust walk and remember.');
      } else {
        initPuzzle(FW.pz_idx);
      }
    }
    return;
  }
  const p=pz.player;
  // Input
  if(goL()){p.vx=-2;if(p.gnd)p.dir=-1;}
  else if(goR()){p.vx=2;if(p.gnd)p.dir=1;}
  else p.vx*=0.6;
  pzJump(p);pzPhys(p,pz.ground);

  if(pz.type==='push'){
    const bx=pz.box;
    // Push box
    const touching=!(p.x+p.w<bx.x||p.x>bx.x+bx.w||p.y+p.h<bx.y||p.y>bx.y+bx.h);
    if(touching&&p.vx!==0){bx.x+=p.vx;bx.x=Math.max(4,Math.min(bx.x,GW-bx.w-4));}
    bx.y=pz.ground-bx.h;// box stays on ground
    // Check switch
    const onSwitch=Math.abs(bx.x+bx.w/2-pz.switch_x)<14&&Math.abs(bx.y+bx.h-pz.switch_y)<14;
    pz.active=onSwitch;pz.door.open=onSwitch;
    // Check if player through door
    if(pz.door.open&&p.x+p.w>=pz.door.x){
      if(!pz.msgShown){pz.msgShown=true;showMsg(8);}
      if(pz.clearTimer===0&&!modalOpen)pz.clearTimer=260;
    }
  } else if(pz.type==='timed'){
    if(!pz.hit&&Math.abs(p.x+p.w/2-pz.switch_x)<14&&p.y+p.h>=pz.switch_y-4&&p.y<pz.switch_y+8){
      pz.hit=true;pz.door.open=true;pz.door.timer=480;snd('block');burst(pz.switch_x,pz.switch_y,'#FFD700',10,true);
    }
    if(pz.door.open){pz.door.timer--;if(pz.door.timer<=0)pz.door.open=false;}
    if(p.x+p.w>=pz.door.x&&pz.hit){
      if(!pz.msgShown){pz.msgShown=true;}
      if(pz.clearTimer===0&&!modalOpen)pz.clearTimer=260;
    }
  } else if(pz.type==='double'){
    const b1=pz.box1,b2=pz.box2;
    const t1=!(p.x+p.w<b1.x||p.x>b1.x+b1.w||p.y+p.h<b1.y||p.y>b1.y+b1.h);
    const t2=!(p.x+p.w<b2.x||p.x>b2.x+b2.w||p.y+p.h<b2.y||p.y>b2.y+b2.h);
    if(t1&&p.vx!==0){b1.x+=p.vx;b1.x=Math.max(4,Math.min(b1.x,GW-b1.w-4));}
    if(t2&&p.vx!==0){b2.x+=p.vx;b2.x=Math.max(4,Math.min(b2.x,GW-b2.w-4));}
    b1.y=pz.ground-b1.h;b2.y=pz.ground-b2.h;
    pz.a1=Math.abs(b1.x+b1.w/2-pz.sw1_x)<14;
    pz.a2=Math.abs(b2.x+b2.w/2-pz.sw2_x)<14;
    pz.door.open=pz.a1&&pz.a2;
    if(pz.door.open&&p.x+p.w>=pz.door.x){
      if(!pz.msgShown)pz.msgShown=true;
      if(pz.clearTimer===0&&!modalOpen)pz.clearTimer=260;
    }
  } else if(pz.type==='plate'){
    // Box physics — player pushes box by walking into it
    const bx=pz.box;
    const touchingB=!(p.x+p.w<bx.x||p.x>bx.x+bx.w||p.y+p.h<bx.y||p.y>bx.y+bx.h);
    if(touchingB&&p.vx!==0){bx.x+=p.vx;bx.x=Math.max(4,Math.min(bx.x,GW-bx.w-4));}
    bx.y=pz.ground-bx.h;
    // Plate pressed by box OR player standing on it
    const boxOnPlate=bx.x+bx.w>pz.plate.x&&bx.x<pz.plate.x+pz.plate.w;
    const playerOnPlate=p.gnd&&p.x+p.w>pz.plate.x&&p.x<pz.plate.x+pz.plate.w;
    pz.plate.pressed=boxOnPlate||playerOnPlate;
    pz.door.open=pz.plate.pressed;
    // Win condition: box holds plate AND player reaches door
    if(pz.door.open&&p.x+p.w>=pz.door.x&&boxOnPlate){
      if(!pz.msgShown)pz.msgShown=true;
      if(pz.clearTimer===0&&!modalOpen)pz.clearTimer=260;
    }
  }
}

// ── PHASE 3: MEMORY RUNNER ────────────────────────────────────
function updateMemory(){
  FW.mr_off+=0.45; // slower — plenty of time to read
  // Player jumps (state fields initialized in initFinal)
  FW.mr_vy=Math.min(FW.mr_vy+0.38,8);
  FW.mr_y+=FW.mr_vy;
  FW.mr_gnd=false;
  // Platform landing
  for(const pl of FW.mr_plats){
    const px=pl.x-FW.mr_off+60; // 60 = player screen x
    if(FW.mr_vy>=0&&FW.mr_y+16>=pl.y&&FW.mr_y+16<=pl.y+10&&65>px&&55<px+pl.w){
      FW.mr_y=pl.y-16;FW.mr_vy=0;FW.mr_gnd=true;FW.mr_coyote=6;
    }
  }
  // Ground
  if(FW.mr_y+16>=140){FW.mr_y=124;FW.mr_vy=0;FW.mr_gnd=true;FW.mr_coyote=6;}
  if(FW.mr_gnd)FW.mr_coyote=6;else if(FW.mr_coyote>0)FW.mr_coyote--;
  if(doJ()&&!FW.mr_prevJ)FW.mr_jbuf=8;else if(FW.mr_jbuf>0)FW.mr_jbuf--;
  FW.mr_prevJ=doJ();
  if(FW.mr_jbuf>0&&FW.mr_coyote>0&&!FW.mr_jp){
    FW.mr_vy=-7;FW.mr_jp=true;FW.mr_coyote=0;FW.mr_jbuf=0;snd('jump');
    burst(60+6,FW.mr_y+16,'#FFD700',5,false);
  }
  if(!doJ())FW.mr_jp=false;
  if(FW.mr_gnd)FW.mr_wf++;

  // Collect floating stars
  FW.mr_stars.forEach(st=>{
    if(st.got)return;
    const sx=st.x-FW.mr_off+60;
    if(Math.abs(sx-66)<14&&Math.abs(FW.mr_y-st.y)<16){
      st.got=true;snd('pup');burst(sx,st.y,'#FFD700',12,true);
      if(FW.mr_stars.every(s2=>s2.got)&&!FW.mr_starsMsg){
        FW.mr_starsMsg=true;
        // inject a bonus message at the end
        FW.mr_msgs.push({x:FW.mr_msgs[FW.mr_msgs.length-1].x+300,txt:'⭐ ALL STARS! YOU\'RE INCREDIBLE. ⭐'});
      }
    }
  });

  // End when last message passes
  const lastMsg=FW.mr_msgs[FW.mr_msgs.length-1];
  if(FW.mr_off>lastMsg.x+200){
    transitionTo(3,'');
  }
}

// ── PHASE 4: ENDING ───────────────────────────────────────────
function updateEnding(){
  END.timer++;
  updParts();
  switch(END.stage){
    case 0:
      if(END.timer===1){addShake(6);stopMusic();}
      if(END.timer===45)addShake(4);
      if(END.timer===75)addShake(2);
      if(END.timer>=180){END.stage=1;END.timer=0;}
      break;
    case 1:
      if(END.timer>=200){END.stage=2;END.timer=0;snd('cinematic');}
      break;
    case 2:
      if(END.timer>=180){END.stage=3;END.timer=0;snd('rise');}
      break;
    case 3:
      END.cakeY=Math.max(GH/2+10,END.cakeY-2.2);
      if(END.timer>=280){END.stage=4;END.timer=0;snd('boom');}
      break;
    case 4:
      END.hbScale=Math.min(1,END.timer/30);
      if(END.timer===1)END.cakeInputActive=true; // start accepting name input
      if(END.timer>40)END.nameScale=Math.min(1,(END.timer-40)/25);
      if(END.timer===60&&!END.confettiSpawned){
        snd('celebration');confettiBurst(GW/2,GH/2,60);addShake(4);END.confettiSpawned=true;
      }
      if(END.timer%8===0)confettiBurst(Math.random()*GW,Math.random()*40+20,6);
      if(END.timer>=320){END.stage=5;END.timer=0;snd('whisper');}
      break;
    case 5:
      for(let i=0;i<END_MSG_LINES.length;i++){
        if(END.timer>=END_MSG_TIMINGS[i]){
          const age=END.timer-END_MSG_TIMINGS[i];
          END.msgAlphas[i]=Math.min(1,age/25);
          if(age===1&&i>0)snd('heartbeat');
        }
      }
      if(END.timer>=960){END.stage=6;END.timer=0;}
      break;
    case 6:
      END.scoreAlpha=Math.min(1,END.timer/40);
      if(END.timer>=340){END.stage=7;END.timer=0;}
      break;
    case 7:
      END.secretTimer++;
      // Auto-advance after 5 seconds, or immediately on any key/click
      if(!END.secretShown&&(doJ()||K.Enter||K.Space||K.ArrowLeft||K.ArrowRight))END.secretShown=true;
      if(END.secretTimer>=300&&!FW.endingTriggered){
        FW.endingTriggered=true;
        worldDone[3]=true;
        saveStars(3,3);
        confettiBurst(GW/2,GH/2,80);
        gs='win';
      }
      break;
  }
}

  } else if(ri===2){

    // Sky
    const pbg=ctx.createLinearGradient(0,0,0,s(GH));
    pbg.addColorStop(0,'#0A1A3A');pbg.addColorStop(1,'#1A3A6A');

    plats.forEach(p=>{draw3DPlatform(p.x,p.y,p.w);});

    ctx.fillStyle='rgba(0,255,136,.2)';ctx.fillRect(s(GW-90),s(90),s(18),s(50));
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';

      ctx.fillStyle='rgba(255,255,255,.4)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";

      const ms=Math.round(FW.rt_score*(1000/60));
      const rating=FW.rt_score<15?'LEGENDARY! ⚡':FW.rt_score<30?'GREAT! 🔥':FW.rt_score<60?'GOOD! 👍':'SLOW! 😂';
      glow('#FFD700',8);ctx.fillStyle='#FFD700';ctx.font=s(6)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
