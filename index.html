// ── DRAW PUZZLE PHASE ─────────────────────────────────────────
function drPuzzlePhase(){
  const pz=FW.pz;if(!pz)return;
  // Background — stone dungeon
  const dBg=ctx.createLinearGradient(0,0,0,s(GH));
  dBg.addColorStop(0,'#100818');dBg.addColorStop(1,'#1A1228');
  ctx.fillStyle=dBg;ctx.fillRect(0,0,cv.width,cv.height);
  // Floor
  ctx.fillStyle='#2A1E3A';ctx.fillRect(0,s(pz.ground),cv.width,s(GH-pz.ground));
  ctx.fillStyle='#3A2A4A';ctx.fillRect(0,s(pz.ground),cv.width,s(2));
  // Stone tile pattern
  ctx.fillStyle='rgba(255,255,255,.03)';
  for(let tx=0;tx<GW;tx+=20)ctx.fillRect(s(tx),s(pz.ground),s(1),s(GH-pz.ground));

  // Puzzle hint at top (split bar: hint left, progress right)
  const pzHints=[
    'PUSH THE BOX ONTO THE SWITCH!',
    'HIT SWITCH · THEN RUN THROUGH!',
    'PUSH EACH BOX TO ITS SWITCH!',
    'BOX HOLDS PLATE · YOU RUN!',
  ];
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(s(0),s(0),s(GW),s(16));
  ctx.fillStyle='rgba(255,215,0,.9)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillText(pzHints[FW.pz_idx],s(GW/2-30),s(11));
  // Progress dots top-right
  for(let pi=0;pi<4;pi++){
    const done=pi<FW.pz_idx||(pi===FW.pz_idx&&pz.clearTimer>0);
    const cur=pi===FW.pz_idx&&pz.clearTimer===0;
    glow(done?'#00FF88':cur?'#FFD700':'none',done?4:cur?3:0);
    ctx.fillStyle=done?'#00FF88':cur?'#FFD700':'#444';
    ctx.font=s(done?5:cur?4.5:3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText(done?'✓':(pi+1),s(GW-62+pi*18),s(11));
    noGlow();
  }

  // Controls reminder bottom
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(s(0),s(GH-14),s(GW),s(14));
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.font=s(3)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillText('← → MOVE   SPACE/↑ JUMP',s(GW/2),s(GH-4));

  // Puzzle-specific drawing
  if(pz.type==='push'){
    drPzBox(pz.box,'#8844AA');
    drPzSwitch(pz.switch_x,pz.switch_y,pz.active);
    drPzDoor(pz.door);
    if(!pz.active){drPzArrow(pz.box.x+pz.box.w/2,'PUSH ME!');}
    if(!pz.active){drPzArrow(pz.switch_x,'TARGET');}
  } else if(pz.type==='timed'){
    drPzSwitch(pz.switch_x,pz.switch_y,pz.hit);
    drPzDoor(pz.door);
    if(!pz.hit){drPzArrow(pz.switch_x,'HIT THIS!');}
    if(pz.hit&&pz.door.open){
      const pct=pz.door.timer/320;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(s(pz.door.x-14),s(pz.door.y-10),s(36),s(7));
      ctx.fillStyle=pct>.5?'#44FF88':'#FF8800';ctx.fillRect(s(pz.door.x-12),s(pz.door.y-9),s(32*pct),s(5));
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.font=s(3)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('RUN!',s(pz.door.x+4),s(pz.door.y-4));
    }
  } else if(pz.type==='double'){
    drPzBox(pz.box1,'#884488');drPzBox(pz.box2,'#448888');
    drPzSwitch(pz.sw1_x,pz.sw1_y,pz.a1,'#884488');
    drPzSwitch(pz.sw2_x,pz.sw2_y,pz.a2,'#448888');
    drPzDoor(pz.door);
    if(!pz.a1){drPzArrow(pz.sw1_x,'MATCH','#884488');}
    if(!pz.a2){drPzArrow(pz.sw2_x,'MATCH','#448888');}
  } else if(pz.type==='plate'){
    // Draw pressure plate
    const pl=pz.plate;
    const plCol=pl.pressed?'#00FF88':'#CC4400';
    glow(plCol,pl.pressed?8:3);
    ctx.fillStyle=plCol;ctx.fillRect(s(pl.x),s(pl.y),s(pl.w),s(4));
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(s(pl.x),s(pl.y),s(pl.w),s(1));
    noGlow();
    // Plate label
    ctx.fillStyle=pl.pressed?'#00FF88':'rgba(255,100,0,.7)';
    ctx.font=s(2.8)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText(pl.pressed?'✓':'PLATE',s(pl.x+pl.w/2),s(pl.y+12));
    // Box
    drPzBox(pz.box,'#CC6600');
    // Door
    drPzDoor(pz.door);
    // Hint arrows
    if(!pl.pressed){
      drPzArrow(pl.x+pl.w/2,'BOX HERE','#CC6600');
    } else if(pz.box.x+pz.box.w/2>pl.x&&pz.box.x<pl.x+pl.w){
      // Box is on plate — tell player to run!
      const bounce=Math.sin(frame*.2)*3;
      glow('#00FF88',6);
      ctx.fillStyle='#00FF88';ctx.font=s(5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('→ RUN! →',s(GW/2),s(GH/2-30+bounce));
      noGlow();
    }
  }

  // Solved flash — green glow fills the screen briefly
  if(pz.msgShown&&pz.clearTimer>100){
    const fl=Math.min((160-pz.clearTimer)/30,1);
    ctx.globalAlpha=fl*(1-fl)*4*.35;
    ctx.fillStyle='#00FF88';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.globalAlpha=1;
  }

  // Puzzle message shown on solve
  if(pz.msgShown){
    const a=pz.clearTimer>0?Math.min((160-pz.clearTimer)/20,1):1;
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(s(GW/2-108),s(GH/2-20),s(216),s(36));
    ctx.fillStyle='#00FF88';ctx.fillRect(s(GW/2-108),s(GH/2-20),s(216),s(2));
    ctx.fillRect(s(GW/2-108),s(GH/2+16),s(216),s(2));
    glow('#FFD700',6);ctx.fillStyle='#FFD700';ctx.font=s(4)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText(pz.msg,s(GW/2),s(GH/2+2));noGlow();
    ctx.fillStyle='rgba(0,255,136,.6)';ctx.font=s(3)+"px 'Press Start 2P',monospace";
    ctx.fillText('✓ PUZZLE SOLVED',s(GW/2),s(GH/2+14));
    ctx.globalAlpha=1;
  }

  // Draw puzzle player
  const pp=pz.player;
  drawSprite(pp.x,pp.y,pp.dir||1,pp.gnd?frame*.4:0,pp.gnd,0);
}

function drPzBox(bx,col){
  glow(col,6);
  ctx.fillStyle=col;ctx.fillRect(s(bx.x),s(bx.y),s(bx.w),s(bx.h));
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(s(bx.x),s(bx.y),s(bx.w),s(3));
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(s(bx.x+bx.w-3),s(bx.y),s(3),s(bx.h));
  noGlow();
}
function drPzSwitch(sx,sy,active,col){
  col=col||'#FFD700';
  ctx.fillStyle=active?col:'#444';ctx.fillRect(s(sx-8),s(sy-4),s(16),s(8));
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(s(sx-8),s(sy-4),s(16),s(2));
  if(active){glow(col,8);ctx.fillStyle=col;ctx.fillRect(s(sx-3),s(sy-8),s(6),s(6));noGlow();}
}
function drPzDoor(door){
  if(door.open){
    ctx.globalAlpha=.3;ctx.fillStyle='#00FF88';ctx.fillRect(s(door.x),s(door.y),s(door.w),s(door.h));ctx.globalAlpha=1;
    glow('#00FF88',10);ctx.fillStyle='#00FF88';ctx.fillRect(s(door.x),s(door.y),s(door.w),s(3));ctx.fillRect(s(door.x),s(door.y+door.h-3),s(door.w),s(3));noGlow();
  } else {
    ctx.fillStyle='#3A2A4A';ctx.fillRect(s(door.x),s(door.y),s(door.w),s(door.h));
    ctx.fillStyle='#5A3A6A';ctx.fillRect(s(door.x),s(door.y),s(door.w),s(3));
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(s(door.x),s(door.y+door.h*.3),s(door.w),s(door.h*.4));
  }
}
function drPzArrow(tx,label,col){
  col=col||'#FFD700';
  const bounce=Math.sin(frame*.15)*3;
  glow(col,4);
  ctx.fillStyle=col;ctx.font=s(8)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillText('↓',s(tx),s(GH*.35+bounce));
  noGlow();
  if(label){
    ctx.fillStyle=col;ctx.globalAlpha=.8;ctx.font=s(3)+"px 'Press Start 2P',monospace";
    ctx.fillText(label,s(tx),s(GH*.35-6+bounce));
    ctx.globalAlpha=1;
  }
}

// ── DRAW MEMORY RUNNER ────────────────────────────────────────
function drMemoryRunner(){
  // Soft dark background
  const mBg=ctx.createLinearGradient(0,0,0,s(GH));
  mBg.addColorStop(0,'#04020A');mBg.addColorStop(1,'#080414');
  ctx.fillStyle=mBg;ctx.fillRect(0,0,cv.width,cv.height);

  // Floating stars/particles — slow gentle drift
  for(let i=0;i<25;i++){
    const sx=((i*97+FW.mr_off*.08)%GW);const sy=((i*61+frame*.02)%(GH*.75));
    ctx.globalAlpha=.12+Math.sin(frame*.04+i)*.1;
    ctx.fillStyle='#FFFFD0';ctx.fillRect(s(sx),s(sy),s(1+(i%4===0?1:0)),s(1+(i%4===0?1:0)));
  }ctx.globalAlpha=1;

  // Ground — dark glowing line
  glow('#6644AA',6);ctx.fillStyle='#3A2A5A';ctx.fillRect(0,s(140),cv.width,s(GH-140));noGlow();
  ctx.fillStyle='rgba(150,100,255,.35)';ctx.fillRect(0,s(140),cv.width,s(1));

  // Platforms
  FW.mr_plats.forEach(pl=>{
    const px=pl.x-FW.mr_off+60;
    if(px+pl.w<-10||px>GW+10)return;
    // Glowing purple platforms
    glow('#8844FF',4);
    ctx.fillStyle='#3A2070';ctx.fillRect(s(px),s(pl.y),s(pl.w),s(8));
    ctx.fillStyle='#6633BB';ctx.fillRect(s(px),s(pl.y),s(pl.w),s(2));
    ctx.fillStyle='rgba(180,100,255,.2)';ctx.fillRect(s(px-1),s(pl.y-1),s(pl.w+2),s(10));
    noGlow();
  });

  // Memory photos — polaroid frames floating above the runner
  MR_PHOTO_DATA.forEach((pd,i)=>{
    const px=pd.x-FW.mr_off+60;
    if(px<-pd.w*2||px>GW+pd.w*2)return;
    const dist=Math.abs(px-GW/2);
    const a=Math.max(0,Math.min(1,1-dist/180));
    if(a<=0)return;
    const bob=Math.sin(frame*.05+i*1.3)*2.5;
    const tilt=(Math.sin(i*2.1))*6; // static gentle tilt per photo
    const py=28+bob;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.translate(s(px),s(py));
    ctx.rotate(tilt*Math.PI/180);
    // Polaroid shadow
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.fillRect(s(-pd.w/2+1),s(-2),s(pd.w+4),s(pd.h+18));
    // Polaroid white frame
    ctx.fillStyle='#FFF8F0';
    ctx.fillRect(s(-pd.w/2-3),s(-5),s(pd.w+6),s(pd.h+22));
    // Photo image
    const img=MR_PHOTOS[pd.img];
    if(img.complete&&img.naturalWidth>0){
      ctx.drawImage(img,s(-pd.w/2),s(-3),s(pd.w),s(pd.h));
    } else {
      // Placeholder while loading
      ctx.fillStyle='#DDD';ctx.fillRect(s(-pd.w/2),s(-3),s(pd.w),s(pd.h));
    }
    // Caption on white strip at bottom
    ctx.fillStyle='#222';ctx.font=s(2.8)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText(pd.label,0,s(pd.h+13));
    // Subtle tape at top
    ctx.fillStyle='rgba(255,255,180,0.6)';ctx.fillRect(s(-8),s(-8),s(16),s(5));
    ctx.restore();
    ctx.globalAlpha=1;
  });

  // Floating messages
  FW.mr_msgs.forEach(m=>{
    const mx=m.x-FW.mr_off+60;
    if(mx<-200||mx>GW+50)return;
    const dist=Math.abs(mx-GW/2);
    const a=Math.max(0,1-dist/160);
    const sz=3.5+a*1.5;
    ctx.globalAlpha=a;
    ctx.save();ctx.translate(s(mx),s(GH/2-15));
    // Glow behind text
    ctx.globalAlpha=a*.25;ctx.fillStyle='#FFD700';ctx.fillRect(s(-80),s(-8),s(160),s(18));ctx.globalAlpha=a;
    glow('#FFD700',a>0.5?8:0);
    ctx.fillStyle='#FFE8AA';ctx.font=s(sz)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText(m.txt,0,0);
    noGlow();
    ctx.restore();ctx.globalAlpha=1;
  });

  drParts(false);

  // Collectible stars
  FW.mr_stars&&FW.mr_stars.forEach(st=>{
    if(st.got)return;
    const sx=st.x-FW.mr_off+60;
    if(sx<-10||sx>GW+10)return;
    const bob=Math.sin(frame*.1+st.x*.01)*3;
    glow('#FFD700',8);
    ctx.fillStyle='#FFD700';ctx.font=s(10)+"px serif";ctx.textAlign='center';
    ctx.fillText('⭐',s(sx),s(st.y+bob));
    noGlow();
    // Subtle attract ring
    ctx.globalAlpha=0.2+Math.sin(frame*.12)*0.15;
    ctx.strokeStyle='#FFD700';ctx.lineWidth=s(1);
    ctx.beginPath();ctx.arc(s(sx),s(st.y-4+bob),s(8+Math.sin(frame*.1)*2),0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  });

  // Player — drawn at fixed screen x=60
  drawSprite(60,FW.mr_y,1,FW.mr_wf,FW.mr_gnd,0);

  // Jump hint at the very start
  if(FW.timer<200){
    const a=Math.min(1,FW.timer/20)*Math.max(0,1-(FW.timer-140)/60);
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(s(GW/2-70),s(GH-20),s(140),s(16));
    ctx.fillStyle='#FFD700';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText('SPACE/↑ TO JUMP',s(GW/2),s(GH-9));
    ctx.globalAlpha=1;
  }

  // Progress glow at the end — light at horizon
  const endX=FW.mr_msgs[FW.mr_msgs.length-1].x-FW.mr_off+60;
  if(endX>0&&endX<GW+200){
    const a=Math.max(0,1-endX/GW);
    ctx.globalAlpha=a*.4;
    const lGrad=ctx.createLinearGradient(s(Math.max(endX-50,0)),0,s(GW),0);
    lGrad.addColorStop(0,'rgba(255,215,0,0)');lGrad.addColorStop(1,'rgba(255,215,0,.8)');
    ctx.fillStyle=lGrad;ctx.fillRect(s(Math.max(endX-50,0)),0,s(GW),cv.height);
    ctx.globalAlpha=1;
  }
}

// ── DRAW ENDING PHASE ─────────────────────────────────────────
function drEndingPhase(){
  if(END.stage===0){
    const darken=Math.min(END.timer/120,1);
    ctx.fillStyle='rgb('+Math.round(20-darken*20)+','+Math.round(5-darken*5)+','+Math.round(5-darken*5)+')';
    ctx.fillRect(0,0,cv.width,cv.height);
    drParts(false);
    ctx.globalAlpha=Math.max(0,1-END.timer/60);
    ctx.fillStyle='#FF6600';ctx.font=s(4)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText('BOSS DEFEATED',s(GW/2),s(GH/2));ctx.globalAlpha=1;
    return;
  }
  ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
  drParts(false);
  if(END.stage===1){
    const fadeIn=Math.min(END.timer/50,1);
    ctx.fillStyle='rgba(0,0,0,'+fadeIn+')';ctx.fillRect(0,0,cv.width,cv.height);
    if(END.timer>60){
      const a=Math.min((END.timer-60)/30,1);ctx.globalAlpha=a;
      glow('#fff',6);ctx.fillStyle='#fff';ctx.font=s(11)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('CLEARED',s(GW/2),s(GH/2+6));noGlow();ctx.globalAlpha=1;
    }
    return;
  }
  if(END.stage===2){
    const a=Math.min(END.timer/20,1)*(END.timer>90?Math.max(0,1-(END.timer-90)/30):1);
    ctx.globalAlpha=a;
    glow(END.timer>60?'#FFD700':'#fff',END.timer>60?10:4);
    ctx.fillStyle=END.timer>60?'#FFD700':'#fff';
    ctx.font=s(11)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText('CLEARED',s(GW/2),s(GH/2+6));noGlow();ctx.globalAlpha=1;
    return;
  }
  if(END.stage===3){
    const ck=GW/2,cy=END.cakeY;
    const glowA=Math.min((GH-cy)/80,0.6);
    ctx.globalAlpha=glowA*.35;ctx.fillStyle='#FFD700';ctx.fillRect(0,s(cy+20),cv.width,s(GH-cy-20));ctx.globalAlpha=1;
    r(ck-30,cy+12,60,28,'#FF88BB',false);r(ck-32,cy+10,64,6,'#FFBBDD',false);r(ck-26,cy+6,52,7,'#fff',false);
    r(ck-32,cy+8,8,32,'#CC5590',false);
    ['#E63946','#FF8800','#4488FF','#52C234','#AA44FF','#FF44AA'].forEach((c,i)=>{
      r(ck-20+i*8,cy+2,3,8,c,false);const fl=Math.sin(frame*.3+i)>.3?1:0;
      glow(c,5);r(ck-21+i*8+fl,cy-5,5,7,c,false);r(ck-20+i*8,cy-3,3,4,'#FFD700',false);noGlow();
    });
    if(cy<GH/2+20){
      const a=Math.min((GH/2+20-cy)/20,1);ctx.globalAlpha=a;
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText("But this wasn't the real goal...",s(GW/2),s(cy+50));ctx.globalAlpha=1;
    }
    return;
  }
  if(END.stage===4){
    const ck=GW/2,cy=END.cakeY;
    r(ck-20,cy+12,40,18,'#FF88BB',false);r(ck-20,cy+6,40,4,'#FFBBDD',false);
    ['#E63946','#FF8800','#4488FF','#52C234','#AA44FF'].forEach((c,i)=>{
      r(ck-14+i*7,cy+2,2,6,c,false);glow(c,3);r(ck-14+i*7,cy-2,2,4,c,false);noGlow();
    });
    drParts(false);
    if(END.hbScale>0){
      const sc=END.hbScale,bounce=sc<1?1+Math.sin(sc*Math.PI)*0.12:1;
      ctx.save();ctx.translate(s(GW/2),s(GH/2-28));ctx.scale(sc*bounce,sc*bounce);
      ctx.fillStyle='#FF88BB';ctx.font=s(7)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('HAPPY BIRTHDAY',0,0);ctx.restore();
    }
    if(END.nameScale>0){
      const sc=END.nameScale,bounce=sc<1?1+Math.sin(sc*Math.PI)*0.22:1;
      ctx.save();ctx.translate(s(GW/2),s(GH/2+4));ctx.scale(sc*bounce,sc*bounce);
      glow('#FFD700',14);ctx.fillStyle='#FFD700';ctx.font=s(10)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('ABDALLAH!!',0,0);noGlow();ctx.restore();
      if(END.nameScale>=0.9){
        const icons=['\u2B50','\uD83C\uDF82','\uD83C\uDFAE','\uD83D\uDC51','\uD83D\uDD25','\uD83D\uDC9B'];
        icons.forEach((ic,i)=>{
          const ang=(i/icons.length)*Math.PI*2+frame*.025;
          const dist=36+Math.sin(frame*.06)*4;
          ctx.font=s(8)+"px serif";ctx.textAlign='center';
          ctx.fillText(ic,s(GW/2+Math.cos(ang)*dist),s(GH/2+4+Math.sin(ang)*dist*.4));
        });
        // ── Cake name input ────────────────────────────────
        const ny=GH/2+38;
        if(!END.cakeNameDone){
          // Input box
          ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(s(GW/2-72),s(ny-2),s(144),s(16));
          ctx.fillStyle='rgba(255,215,0,.4)';ctx.fillRect(s(GW/2-72),s(ny-2),s(144),s(2));
          ctx.fillRect(s(GW/2-72),s(ny+12),s(144),s(2));
          const cursor=Math.floor(frame/18)%2===0?'_':'';
          ctx.fillStyle='#FFD700';ctx.font=s(4)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
          ctx.fillText((END.cakeName||'')+cursor,s(GW/2),s(ny+9));
          // Prompt
          ctx.globalAlpha=0.5;ctx.fillStyle='#fff';ctx.font=s(2.8)+"px 'Press Start 2P',monospace";
          ctx.fillText('TYPE YOUR NAME · ENTER TO SET',s(GW/2),s(ny-6));ctx.globalAlpha=1;
        } else if(END.cakeName){
          // Show the name on the cake ribbon
          glow('#FF88BB',6);
          ctx.fillStyle='#FF88BB';ctx.font=s(4.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
          ctx.fillText('for '+END.cakeName+' 🎂',s(GW/2),s(ny+9));noGlow();
        }
      }
    }
    return;
  }
  if(END.stage===5){
    ctx.fillStyle='rgba(0,0,0,.1)';ctx.fillRect(0,0,cv.width,cv.height);
    drParts(false);
    END_MSG_LINES.forEach((ln,i)=>{
      const a=END.msgAlphas[i];if(!a)return;
      const isEnd=i>=5;
      const ypos=25+i*18;
      ctx.globalAlpha=a;
      const col=i===END_MSG_LINES.length-1?'#FF88BB':isEnd?'#FFD700':'rgba(255,255,255,.88)';
      const sz=isEnd?(i===END_MSG_LINES.length-1?5:4.5):4;
      if(isEnd)glow(col,6);
      ctx.fillStyle=col;ctx.font=s(sz)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText(ln,s(GW/2),s(ypos));
      if(isEnd)noGlow();ctx.globalAlpha=1;
    });
    return;
  }
  if(END.stage===6){
    const a=END.scoreAlpha;ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(s(GW/2-100),s(GH/2-60),s(200),s(108));
    ctx.fillStyle='rgba(255,215,0,.25)';ctx.fillRect(s(GW/2-100),s(GH/2-60),s(200),s(3));
    ctx.fillRect(s(GW/2-100),s(GH/2+48),s(200),s(3));
    for(let si=0;si<3;si++){
      glow('#FFD700',4);ctx.fillStyle='#FFD700';ctx.font=s(12)+"px serif";
      ctx.textAlign='center';ctx.fillText('★',s(GW/2-24+si*24),s(GH/2-32));noGlow();
    }
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText('YOU COMPLETED',s(GW/2),s(GH/2-6));
    ctx.fillStyle='#FF88BB';ctx.font=s(3)+"px 'Press Start 2P',monospace";
    ctx.fillText("ABDALLAH'S BIRTHDAY QUEST",s(GW/2),s(GH/2+8));
    // Personal best message
    const h=player?player.hearts:0;
    let pb='';
    if(lives>=3&&h>=3)pb='Perfect run. Absolute legend.';
    else if(lives>=2&&h>=2)pb='Finished strong. Impressive.';
    else if(lives>=2)pb='Tough but you made it through!';
    else pb='You never gave up. That\'s you.';
    ctx.fillStyle='rgba(255,215,0,.85)';ctx.font=s(3)+"px 'Press Start 2P',monospace";
    ctx.fillText(pb,s(GW/2),s(GH/2+28));
    const statLine=lives+' lives · '+Math.floor(h||0)+' hearts remaining';
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font=s(2.6)+"px 'Press Start 2P',monospace";
    ctx.fillText(statLine,s(GW/2),s(GH/2+40));
    ctx.globalAlpha=1;
    return;
  }
  if(END.stage===7){
    drParts(false);
    if(!END.secretShown){
      const pulse=Math.sin(frame*.08)*.3+.7;ctx.globalAlpha=pulse;
      ctx.fillStyle='rgba(255,255,255,.55)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('— press any key —',s(GW/2),s(GH/2));ctx.globalAlpha=1;
    } else {
      const a=Math.min(END.secretTimer/40,1);ctx.globalAlpha=a;
      glow('#FFD700',8);
      ctx.fillStyle='#FFD700';ctx.font=s(5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
      ctx.fillText('This game ends...',s(GW/2),s(GH/2-18));noGlow();
      ctx.fillStyle='#FF88BB';ctx.font=s(4.5)+"px 'Press Start 2P',monospace";
      ctx.fillText("but we're just",s(GW/2),s(GH/2+2));
      ctx.fillText('getting started. 💛',s(GW/2),s(GH/2+20));
      ctx.globalAlpha=1;
      if(END.secretTimer>60)confettiBurst(Math.random()*GW,Math.random()*GH*.5,3);
    }
    // Auto-advance progress bar (thin gold line at bottom)
    const prog=Math.min(END.secretTimer/300,1);
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,s(GH-5),cv.width,s(5));
    glow('#FFD700',4);ctx.fillStyle='#FFD700';ctx.fillRect(0,s(GH-5),s(GW*prog),s(5));noGlow();
  }
}

// ── DRAW: MARIO WORLD ────────────────────────────────────────
function drMarioWorld(){
  const L=LDATA[lvlI];
  // Sky gradient — more colors than before
  const bg=ctx.createLinearGradient(0,0,0,s(GH));
  if(lvlI===1){bg.addColorStop(0,'#03001A');bg.addColorStop(.5,'#0A0428');bg.addColorStop(1,'#1A0850');}
  else if(L.sky==='#1A0800'){bg.addColorStop(0,'#0A0000');bg.addColorStop(.4,'#2A0800');bg.addColorStop(1,'#4A1800');}
  else if(L.sky==='#2a1000'){bg.addColorStop(0,'#100300');bg.addColorStop(.4,'#2a1000');bg.addColorStop(1,'#4a2000');}
  else if(L.sky==='#1a0000'){bg.addColorStop(0,'#080000');bg.addColorStop(.5,'#1a0000');bg.addColorStop(1,'#300000');}
  else{bg.addColorStop(0,'#2A6AFF');bg.addColorStop(.35,'#5C94FC');bg.addColorStop(.8,'#9ACFFF');bg.addColorStop(1,'#C8EEFF');}
  ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);

  // Stars (night/dark levels)
  if(L.stars){
    // 3 star layers for depth
    L.stars.forEach((st,idx)=>{
      const depth=idx%3;
      const spd=[.06,.10,.18][depth];
      const sz=[1,1,2][depth];
      const alph=.25+Math.abs(Math.sin(frame*spd+st.x*.08))*.7;
      ctx.globalAlpha=alph*(depth===2?.9:.55);
      ctx.fillStyle=depth===2?'#FFFFFF':'#FFFFD0';
      const sx=st.x-camX*[.05,.10,.18][depth];
      ctx.fillRect(s(sx),s(st.y),s(sz),s(sz));
      if(depth===2&&alph>.7){// twinkle cross on bright stars
        ctx.globalAlpha=alph*.4;ctx.fillRect(s(sx-1),s(st.y+1),s(sz+2),s(1));ctx.fillRect(s(sx+1),s(st.y-1),s(1),s(sz+2));
      }
    });ctx.globalAlpha=1;
  }

  // Far mountain silhouette (parallax layer 1 — 0.08x)
  if(L.hills&&L.hills.length){
    L.hills.forEach(h=>{
      const hx=h.x-camX*.08;
      const mc=lvlI===1?'#0D0630':lvlI>=5?'#1A0A00':'#1A3A6A';
      ctx.fillStyle=mc;
      // Rounded mountain shape
      ctx.fillRect(s(hx+h.w*.1),s(L.groundY-h.h*1.8),s(h.w*.8),s(h.h*1.8));
      ctx.fillRect(s(hx),s(L.groundY-h.h*1.4),s(h.w),s(h.h*1.4));
      ctx.fillRect(s(hx+h.w*.2),s(L.groundY-h.h*2),s(h.w*.6),s(h.h*.5));
    });
  }
  // Mid hills (parallax layer 2 — 0.28x)
  if(L.hills&&L.hills.length){
    L.hills.forEach(h=>{
      const hx=h.x-camX*.28;
      const dc=lvlI===1?'#1A1040':L.hillD;const lc=lvlI===1?'#251860':L.hillC;
      ctx.fillStyle=lc;
      ctx.fillRect(s(hx),s(L.groundY-h.h),s(h.w),s(h.h));
      ctx.fillRect(s(hx+h.w*.08),s(L.groundY-h.h-h.h*.22),s(h.w*.84),s(h.h*.25));
      ctx.fillStyle=dc;ctx.fillRect(s(hx),s(L.groundY-h.h),s(h.w),s(3));
      // Snow cap on day hills
      if(lvlI===0||lvlI===2){ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(s(hx+h.w*.3),s(L.groundY-h.h-h.h*.15),s(h.w*.4),s(h.h*.1));}
    });
  }
  // Near bush/tree layer (parallax 0.7x)
  if(L.hills&&L.hills.length&&(lvlI===0||lvlI===2)){
    L.hills.forEach(h=>{
      const hx=h.x-camX*.7+100;
      const gy=L.groundY;
      ctx.fillStyle='#1A5A10';
      ctx.fillRect(s(hx),s(gy-14),s(22),s(14));ctx.fillRect(s(hx+4),s(gy-20),s(14),s(8));ctx.fillRect(s(hx+7),s(gy-25),s(8),s(7));
      ctx.fillStyle='#2A7A18';ctx.fillRect(s(hx),s(gy-14),s(22),s(3));ctx.fillRect(s(hx+4),s(gy-20),s(14),s(3));
    });
  }

  // Clouds (parallax 0.32x) — fluffier, multi-layer
  const cc=lvlI===0?'#FCFCFC':lvlI===1?'#8888BB':lvlI<=4?'#BB7733':'#BB6644';
  const cs=lvlI===0?'#C8D8F0':lvlI===1?'#5555AA':lvlI<=4?'#884422':'#883322';
  L.clouds.forEach(cl=>{
    const cx2=cl.x-camX*.32,cy=cl.y;
    const cw=cl.big?54:38,ch=cl.big?22:15;
    // Shadow layer
    ctx.globalAlpha=.18;ctx.fillStyle='#000088';
    ctx.fillRect(s(cx2+2),s(cy+3),s(cw),s(ch*.7));
    ctx.globalAlpha=1;
    // Cloud body — more puffs
    ctx.fillStyle=cc;
    ctx.fillRect(s(cx2),s(cy+ch*.32),s(cw),s(ch*.68));
    ctx.fillRect(s(cx2+cw*.18),s(cy),s(cw*.64),s(ch*.75));
    ctx.fillRect(s(cx2+cw*.06),s(cy+ch*.15),s(cw*.32),s(ch*.6));
    ctx.fillRect(s(cx2+cw*.62),s(cy+ch*.12),s(cw*.32),s(ch*.6));
    ctx.fillRect(s(cx2+cw*.38),s(cy-ch*.1),s(cw*.26),s(ch*.5));
    ctx.fillStyle=cs;ctx.fillRect(s(cx2),s(cy+ch*.8),s(cw),s(ch*.2));
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(s(cx2+cw*.22),s(cy),s(cw*.3),s(ch*.2));
  });

  // Torches (enhanced with glow)
  if(L.torches)L.torches.forEach(t=>{
    const tx=t.x*16;
    // Glow circle
    ctx.globalAlpha=.07+Math.sin(frame*.18+t.x)*.04;
    ctx.fillStyle='#FF8800';ctx.fillRect(s(tx-10),s(L.groundY-64),s(36),s(36));
    ctx.globalAlpha=1;
    // Bracket
    ctx.fillStyle='#5A2A08';ctx.fillRect(s(tx+5),s(L.groundY-44),s(6),s(16));
    ctx.fillStyle='#8B4513';ctx.fillRect(s(tx+6),s(L.groundY-44),s(4),s(14));
    ctx.fillStyle='#4A1A00';ctx.fillRect(s(tx+3),s(L.groundY-44),s(10),s(7));
    // Fire
    const fi=Math.floor((frame+t.x)*.3)%3;
    const fc=['#FF6600','#FF8800','#FFCC00'][fi];
    glow('#FF6600',8);
    ctx.fillStyle='#FFCC00';ctx.fillRect(s(tx+6),s(L.groundY-54+Math.sin(frame*.28+t.x)),s(4),s(9));
    ctx.fillStyle=fc;ctx.fillRect(s(tx+5),s(L.groundY-52+Math.sin(frame*.22+t.x)),s(6),s(8));
    ctx.fillStyle='#FF4400';ctx.fillRect(s(tx+7),s(L.groundY-50),s(2),s(5));
    noGlow();
  });

  // Storm overlay (Royale world)
  if(stormX!==null&&stormX>-80){
    const sx=stormX-camX;
    // Multi-layer storm gradient
    const sg=ctx.createLinearGradient(s(Math.max(sx-20,0)),0,s(sx+50),0);
    sg.addColorStop(0,'rgba(200,30,0,.0)');sg.addColorStop(.5,'rgba(255,50,0,.35)');sg.addColorStop(1,'rgba(255,50,0,.8)');
    ctx.fillStyle=sg;ctx.fillRect(0,0,s(sx+50),cv.height);
    if(sx>0){ctx.fillStyle='rgba(200,20,0,.85)';ctx.fillRect(0,0,s(sx),cv.height);}
    // Lightning edge
    ctx.fillStyle='rgba(255,200,0,.5)';ctx.fillRect(s(sx-1),0,s(2),cv.height);
    if(frame%4===0)burst(stormX+35,Math.random()*GH,'#FF6600',3,true);
    if(frame%12===0)burst(stormX+20,Math.random()*GH,'#FFAA00',2,true);
  }

  // Ground with 3D extruded blocks
  const gy=L.groundY;
  // Pit void
  let prev2=0;
  L.segs.forEach(sg=>{
    if(sg.x>prev2){
      const gx2=prev2-camX,gw2=sg.x-prev2;
      if(gx2+gw2>0&&gx2<GW){
        // Pit gradient darkness
        const ptG=ctx.createLinearGradient(0,s(gy),0,s(GH));
        ptG.addColorStop(0,'rgba(0,0,0,.92)');ptG.addColorStop(1,'rgba(0,0,0,1)');
        ctx.fillStyle=ptG;ctx.fillRect(s(Math.max(gx2,-4)),s(gy),s(gw2+4),s(GH-gy+10));
        // Pit edge red warning stripe
        ctx.fillStyle='rgba(180,0,0,.2)';ctx.fillRect(s(Math.max(gx2,0)),s(gy),s(Math.min(gw2,GW)),s(4));
      }
    }
    prev2=sg.x+sg.w;
  });

  // Ground segments — 3D extruded
  L.segs.forEach(sg=>{
    const gx=sg.x-camX;if(gx+sg.w<-16||gx>GW+16)return;
    if(lvlI===1||L.sky==='#1A0800'||L.sky==='#1a0000'){
      // Dark world — stone/lava palette
      const tc=L.sky==='#1A0800'?'#6A5000':L.sky==='#1a0000'?'#880000':'#2A2060';
      const mc=L.sky==='#1A0800'?'#4A3800':L.sky==='#1a0000'?'#660000':'#1A1040';
      const bc=L.sky==='#1A0800'?'#3A2800':L.sky==='#1a0000'?'#440000':'#100830';
      const sc2=L.sky==='#1A0800'?'#2A1800':L.sky==='#1a0000'?'#330000':'#080420';
      draw3DTile(gx,gy,sg.w,tc,mc,bc,sc2);
      if(L.sky==='#1a0000'){// lava crack glow
        ctx.globalAlpha=.1+Math.sin(frame*.05+sg.x*.001)*.06;
        ctx.fillStyle='#FF4400';ctx.fillRect(s(gx),s(gy+10),s(sg.w),s(2));
        ctx.globalAlpha=1;
      }
    } else {
      draw3DTile(gx,gy,sg.w,'#5DD440','#3BA820','#C4873A','#8B5A1C');
    }
  });

  // Platforms — 3D extruded
  L.platforms.forEach(p=>{draw3DPlatform(p.x-camX,p.y,p.w);});

  // Moving platforms — glowing blue 3D
  mplats.forEach(mp=>{
    const px=mp.x-camX,py=mp.y;
    glow('#44AAFF',6);
    ctx.fillStyle='#1A6AFF';ctx.fillRect(s(px),s(py),s(mp.w),s(8));
    noGlow();
    ctx.fillStyle='#88CCFF';ctx.fillRect(s(px),s(py),s(mp.w),s(2));
    ctx.fillStyle='#0A3ACC';ctx.fillRect(s(px),s(py+2),s(2),s(6));ctx.fillRect(s(px+mp.w-2),s(py+2),s(2),s(6));
    // Pulsing underside
    ctx.fillStyle='#0A2A66';ctx.fillRect(s(px+1),s(py+6),s(mp.w-2),s(3));
    ctx.globalAlpha=.1+Math.sin(frame*.14)*.07;ctx.fillStyle='#44AAFF';ctx.fillRect(s(px-2),s(py-2),s(mp.w+4),s(12));ctx.globalAlpha=1;
  });

  // Pipes — 3D look
  if(L.pipes)L.pipes.forEach(pp=>{
    const px=pp.x,py=gy-pp.h,ph=pp.h;
    // Right face (darker = 3D)
    ctx.fillStyle='#174A05';ctx.fillRect(s(px+18),s(py+9),s(8),s(ph-9));
    // Main body
    ctx.fillStyle='#249500';ctx.fillRect(s(px+2),s(py+9),s(16),s(ph-9));
    // Highlight strip
    ctx.fillStyle='#3DC820';ctx.fillRect(s(px+2),s(py+9),s(5),s(ph-9));
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(s(px+2),s(py+9),s(5),s(2));
    // Top cap right face
    ctx.fillStyle='#0A3A00';ctx.fillRect(s(px+20),s(py),s(6),s(10));
    // Top cap main
    ctx.fillStyle='#249500';ctx.fillRect(s(px),s(py),s(20),s(10));
    ctx.fillStyle='#3DC820';ctx.fillRect(s(px),s(py),s(7),s(10));
    // Top cap highlight
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(s(px),s(py),s(20),s(2));
    // Bottom cap face
    ctx.fillStyle='#0A3A00';ctx.fillRect(s(px),s(py+8),s(26),s(2));
  });

  // Q-blocks — glowing
  qblocks.forEach(q=>{
    const by=q.y-q.bnc;
    const qsx=q.x-camX; // screen x
    if(q.hit){
      ctx.fillStyle='#5C3A18';ctx.fillRect(s(qsx),s(by),s(16),s(16));
      ctx.fillStyle='#7A5028';ctx.fillRect(s(qsx),s(by),s(16),s(3));ctx.fillRect(s(qsx),s(by),s(3),s(16));
      ctx.fillStyle='#3A1A08';ctx.fillRect(s(qsx+13),s(by),s(3),s(16));ctx.fillRect(s(qsx),s(by+13),s(16),s(3));
    } else {
      const qc=`rgb(${Math.round(220+30*Math.sin(frame*.12))},${Math.round(170+30*Math.sin(frame*.12))},0)`;
      glow('#FFB600',10);
      ctx.fillStyle=qc;ctx.fillRect(s(qsx),s(by),s(16),s(16));
      noGlow();
      ctx.fillStyle='rgba(255,230,100,.4)';ctx.fillRect(s(qsx),s(by),s(16),s(3));ctx.fillRect(s(qsx),s(by),s(3),s(16));
      ctx.fillStyle='rgba(100,50,0,.4)';ctx.fillRect(s(qsx+13),s(by),s(3),s(16));ctx.fillRect(s(qsx),s(by+13),s(16),s(3));
      ctx.fillStyle='#5A3000';
      const qx=q.x-camX+4,qy=by+3;
      [[2,0,4,2],[6,2,2,2],[4,4,2,2],[4,8,2,2]].forEach(([dx,dy,dw,dh])=>ctx.fillRect(s(qx+dx),s(qy+dy),s(dw),s(dh)));

  // Enemies
  enemies.forEach(en=>{en.type==='koopa'||en.type==='shell'?drKoopa(en):drGoomba(en);});
}

// ── DRAW: DASH WORLD ─────────────────────────────────────────
function drDashWorld(){
  const L=LDATA[lvlI];
  const nc=L.spd>3?'#FF44FF':'#44AAFF';
  // Background — dark gradient
  const dBg=ctx.createLinearGradient(0,0,0,s(GH));
  dBg.addColorStop(0,'#030308');dBg.addColorStop(.6,'#080818');dBg.addColorStop(1,'#0a0a20');
  ctx.fillStyle=dBg;ctx.fillRect(0,0,cv.width,cv.height);

  // ── TRUE 3D PERSPECTIVE ROAD ──────────────────────────────────
  // Vanishing point at center-top
  const vx=GW/2,vy=DGY-45;
  // Road side lines — perspective
  ctx.strokeStyle=nc.replace(')',',0.35)').replace('rgb','rgba');ctx.lineWidth=s(1.5);
  for(let lane=-3;lane<=3;lane++){
    const bx=GW/2+lane*38;
    ctx.beginPath();ctx.moveTo(s(vx),s(vy));ctx.lineTo(s(bx),s(DGY+2));ctx.stroke();
  }
  // Horizontal grid lines — shrinking towards vanishing point
  for(let d=1;d<=8;d++){
    const t=d/8;
    const gy_line=vy+(DGY-vy)*t;
    const lw_line=GW*t;
    ctx.globalAlpha=.15+t*.15;ctx.strokeStyle=nc.replace(')',',1)').replace('rgb','rgba');ctx.lineWidth=s(.5);
    ctx.beginPath();ctx.moveTo(s(vx-lw_line/2),s(gy_line));ctx.lineTo(s(vx+lw_line/2),s(gy_line));ctx.stroke();
  }ctx.globalAlpha=1;

  // Road surface — dark with neon edge glow
  ctx.fillStyle='#0a0a18';ctx.fillRect(0,s(DGY-2),cv.width,s(GH-DGY+2));
  // Neon ground line
  glow(nc,10);ctx.fillStyle=nc;ctx.fillRect(0,s(DGY),cv.width,s(2));noGlow();
  // Ground fade
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(0,s(DGY+2),cv.width,s(2));

  // Draw obstacles
  const offDash=dashOff%(GW*2);
  dashObs.forEach(o=>{
    const ox=o.x-dashOff;if(ox>GW+24||ox<-32)return;
    if(o.t==='spk'){
      // Neon spike with glow
      glow(nc,8);ctx.fillStyle=nc;
      ctx.beginPath();ctx.moveTo(s(ox+6),s(DGY-14));ctx.lineTo(s(ox+13),s(DGY));ctx.lineTo(s(ox-1),s(DGY));ctx.fill();
      noGlow();
      // Reflection on ground
      ctx.globalAlpha=.2;ctx.fillStyle=nc;
      ctx.beginPath();ctx.moveTo(s(ox+6),s(DGY+2));ctx.lineTo(s(ox+10),s(DGY+8));ctx.lineTo(s(ox+2),s(DGY+8));ctx.fill();
      ctx.globalAlpha=1;
    } else if(o.t==='blk'){
      // 3D block — top + front face
      ctx.fillStyle='#1A2A3A';ctx.fillRect(s(ox),s(o.y),s(o.w),s(o.h));// front
      ctx.fillStyle='#2A3A4A';ctx.fillRect(s(ox),s(o.y),s(o.w),s(4));// top face
      ctx.fillStyle='#0A1A2A';ctx.fillRect(s(ox+o.w-3),s(o.y),s(3),s(o.h));// right face
      glow(nc,4);ctx.fillStyle=nc;ctx.fillRect(s(ox),s(o.y),s(o.w),s(1));noGlow();
      ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(s(ox),s(o.y),s(o.w),s(1));
    } else if(o.t==='gap'){
      // Pit — void with glowing edge
      ctx.fillStyle='rgba(0,0,0,.98)';ctx.fillRect(s(ox),s(DGY),s(o.w),s(GH-DGY));
      const pgrd=ctx.createLinearGradient(s(ox),s(DGY),s(ox+o.w),s(DGY));
      pgrd.addColorStop(0,'rgba(200,0,80,.3)');pgrd.addColorStop(.5,'rgba(0,0,0,0)');pgrd.addColorStop(1,'rgba(200,0,80,.3)');
      ctx.fillStyle=pgrd;ctx.fillRect(s(ox),s(DGY),s(o.w),s(8));
    } else if(o.t==='gift'&&!o.got){
      const bobb=Math.sin(frame*.09)*2.5,gy2=o.y+bobb;
      glow('#FFD700',14);
      ctx.fillStyle='#CC2030';ctx.fillRect(s(ox),s(gy2),s(16),s(16));
      ctx.fillStyle='#E63946';ctx.fillRect(s(ox),s(gy2),s(16),s(6));
      ctx.fillStyle='#FFD700';ctx.fillRect(s(ox),s(gy2+5),s(16),s(5));ctx.fillRect(s(ox+6),s(gy2),s(4),s(16));
      noGlow();
    } else if(o.t==='end'){
      const gl2=.6+Math.sin(frame*.14)*.35;
      glow('#FFD700',12);ctx.globalAlpha=gl2;ctx.fillStyle='#FFD700';ctx.fillRect(s(ox+3),s(DGY-52),s(10),s(52));ctx.globalAlpha=1;noGlow();
      ctx.fillStyle='#FFD700';ctx.fillRect(s(ox-1),s(DGY-56),s(18),s(10));
      ctx.fillStyle='#FF88BB';ctx.fillRect(s(ox+1),s(DGY-54),s(14),s(6));
      if(portalOpen){glow('#FFD700',8);ctx.fillStyle='#FFD700';ctx.font=s(5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';ctx.fillText('END',s(ox+8),s(DGY-60));noGlow();}
    }
  });
  drParts(false);drPlayer();
  // Speed meter
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(s(GW-84),s(2),s(82),s(12));
  glow(nc,4);ctx.fillStyle=nc;ctx.font=s(4)+"px 'Press Start 2P',monospace";ctx.textAlign='right';ctx.fillText('SPD:'+L.spd.toFixed(1),s(GW-4),s(11));noGlow();
  // Progress bar
  const prog=Math.min(dashOff/(L.obs[L.obs.length-1].x||1800),1);
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(s(GW/2-62),s(2),s(124),s(7));
  ctx.fillStyle='#222';ctx.fillRect(s(GW/2-60),s(3),s(120),s(5));
  glow(nc,4);ctx.fillStyle=nc;ctx.fillRect(s(GW/2-60),s(3),s(120*prog),s(5));noGlow();
}

// ── DRAW: HUD ────────────────────────────────────────────────
function drHUD(){
  const p=player,L=LDATA[lvlI];
  if(L.type==='final')return;

  // ── LEFT: Hearts + Lives ──────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(s(2),s(2),s(66),s(22));
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(s(2),s(2),s(66),s(1));
  const maxH=Math.max(3,Math.ceil(p.hearts));
  for(let i=0;i<maxH;i++){
    const hx=4+i*13,hy=4;
    const full=p.hearts>=i+1;
    const half=!full&&p.hearts>i;
    const c=full?'#CC1030':half?'#881028':'#221010';
    [[1,0,2,1],[4,0,2,1],[0,1,7,2],[0,3,7,2],[1,5,5,1],[2,6,3,1],[3,7,1,1]].forEach(
      ([dx,dy,dw,dh])=>{ctx.fillStyle=c;ctx.fillRect(s(hx+dx),s(hy+dy),s(dw),s(dh));});
    if(full){ctx.fillStyle='#FF6688';ctx.fillRect(s(hx+1),s(hy+1),s(2),s(1));}
    // Half heart: fill only the left half
    if(half){
      [[1,0,1,1],[0,1,3,2],[0,3,3,2],[1,5,2,1],[2,6,1,1]].forEach(
        ([dx,dy,dw,dh])=>{ctx.fillStyle='#CC1030';ctx.fillRect(s(hx+dx),s(hy+dy),s(dw),s(dh));});
      ctx.fillStyle='#FF6688';ctx.fillRect(s(hx+1),s(hy+1),s(1),s(1));
    }
  }
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='left';
  ctx.fillText('\u00d7 '+lives+' LIVES',s(4),s(21));

  // ── CENTER: Level name + coin count ──────────────────────────
  const lname=(L.name.split('✦')[1]||L.name).trim();
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(s(GW/2-60),s(2),s(120),s(12));
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(s(GW/2-60),s(2),s(120),s(1));
  ctx.fillStyle='#fff';ctx.font=s(3.8)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillText(lname,s(GW/2),s(11));
  // Coin counter (Mario only)
  if(L.type==='mario'&&coins&&coins.length>0){
    const collected=coins.filter(c=>c.got).length;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(s(GW/2-22),s(13),s(44),s(11));
    ctx.fillStyle='#FFD700';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='center';
    ctx.fillText('🪙 '+collected+'/'+coins.length,s(GW/2),s(21));
  }

  // ── RIGHT: Gifts progress bar ─────────────────────────────
  if(L.type!=='ci'){
    const tg=totalGifts()||1;
    const gPct=giftsFound/tg;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(s(GW-80),s(2),s(78),s(22));
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(s(GW-80),s(2),s(78),s(1));
    ctx.fillStyle='#FFD700';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='right';
    ctx.fillText('\uD83C\uDF81 '+giftsFound+'/'+tg,s(GW-3),s(10));
    ctx.fillStyle='#222';ctx.fillRect(s(GW-78),s(13),s(74),s(7));
    const barCol=gPct>=1?'#00FF88':gPct>.5?'#FFD700':'#FF8800';
    glow(barCol,gPct>=1?6:0);
    ctx.fillStyle=barCol;ctx.fillRect(s(GW-78),s(13),s(74*gPct),s(7));
    noGlow();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=s(3)+"px 'Press Start 2P',monospace";ctx.textAlign='right';
    if(gPct>=1){
      glow('#00FF88',4);ctx.fillStyle='#00FF88';ctx.fillText('\u2192 FIND FLAG!',s(GW-3),s(21));noGlow();
    } else {
      ctx.fillText((tg-giftsFound)+' left',s(GW-3),s(21));
    }
  } else {
    const aliveCnt=ciChickens.filter(c=>c.alive).length;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(s(GW-80),s(2),s(78),s(22));
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(s(GW-80),s(2),s(78),s(1));
    ctx.fillStyle='#FF4444';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='right';
    ctx.fillText('\uD83D\uDC14 '+aliveCnt,s(GW-4),s(10));
    const cdPct=1-Math.min(ciFireTimer/18,1);
    ctx.fillStyle='#222';ctx.fillRect(s(GW-78),s(13),s(74),s(7));
    const barC2=cdPct>=1?'#00FFCC':cdPct>.5?'#88FF88':'#FF4444';
    ctx.fillStyle=barC2;ctx.fillRect(s(GW-78),s(13),s(74*cdPct),s(7));
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=s(3)+"px 'Press Start 2P',monospace";ctx.textAlign='right';
    ctx.fillText(cdPct>=1?'READY!':'RELOAD',s(GW-4),s(21));
  }

  // ── POWER-UP ICONS ────────────────────────────────────────
  let iconY=25;
  if(p.hasGun){
    ctx.fillStyle='rgba(0,40,120,.8)';ctx.fillRect(s(2),s(iconY),s(52),s(10));
    glow('#44AAFF',4);ctx.fillStyle='#44AAFF';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='left';
    ctx.fillText('\uD83D\uDD2B\u00d7'+p.gunAmmo,s(4),s(iconY+8));noGlow();iconY+=11;
  }
  if(p.halfDmg){
    ctx.fillStyle='rgba(120,50,0,.8)';ctx.fillRect(s(2),s(iconY),s(52),s(10));
    glow('#FF8800',4);ctx.fillStyle='#FF8800';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='left';
    ctx.fillText('\uD83D\uDEE1 SHIELD',s(4),s(iconY+8));noGlow();iconY+=11;
  }
  if(p.djump){
    ctx.fillStyle='rgba(0,80,60,.8)';ctx.fillRect(s(2),s(iconY),s(52),s(10));
    glow('#00FFCC',4);ctx.fillStyle='#00FFCC';ctx.font=s(3.5)+"px 'Press Start 2P',monospace";ctx.textAlign='left';
    ctx.fillText(p.djumpUsed?'\u21911 USED':'\u2191\u2191 READY',s(4),s(iconY+8));noGlow();
  }

  // ── PAUSE HINT ────────────────────────────────────────────
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font=s(3)+"px monospace";ctx.textAlign='right';
  ctx.fillText('[ESC]=PAUSE',s(GW-3),s(GH-3));
}

// ── TITLE ────────────────────────────────────────────────────
function drTitle(){
  // ── Deep midnight sky with gradient ──
  const tbg=ctx.createLinearGradient(0,0,0,s(GH));
  tbg.addColorStop(0,'#03001A');tbg.addColorStop(.5,'#0A0640');tbg.addColorStop(1,'#1A0A60');
  ctx.fillStyle=tbg;ctx.fillRect(0,0,cv.width,cv.height);

  // ── Twinkling stars ──
  for(let i=0;i<55;i++){
    const sx=(i*97+13)%GW,sy=(i*61+7)%(GH*.72);
    const a=.2+Math.abs(Math.sin(frame*.04+i*.6))*.7;
    ctx.globalAlpha=a;ctx.fillStyle=i%7===0?'#FFD7AA':'#FFFFF0';
    ctx.fillRect(s(sx),s(sy),s(i%11===0?2:1),s(i%11===0?2:1));
    if(a>.8&&i%9===0){
      ctx.globalAlpha=a*.3;ctx.fillRect(s(sx-1),s(sy+1),s(3),s(1));ctx.fillRect(s(sx+1),s(sy-1),s(1),s(3));
    }
  }ctx.globalAlpha=1;

  // ── Glowing moon top right ──
  const moonX=GW-38,moonY=22;
  ctx.globalAlpha=.12;ctx.fillStyle='#FFFFD0';ctx.fillRect(s(moonX-14),s(moonY-14),s(28),s(28));
  ctx.globalAlpha=.06;ctx.fillRect(s(moonX-20),s(moonY-20),s(40),s(40));
  ctx.globalAlpha=1;
  ctx.fillStyle='#FFFFD0';ctx.fillRect(s(moonX-8),s(moonY-8),s(16),s(16));
  ctx.fillRect(s(moonX-10),s(moonY-6),s(20),s(12));
  ctx.fillRect(s(moonX-6),s(moonY-10),s(12),s(20));
  ctx.fillStyle='#F0E8B0';ctx.fillRect(s(moonX-8),s(moonY-8),s(16),s(3));

  // ── Far silhouette city (pixel art buildings) ──
  const buildings=[[10,30,30],[42,20,18],[62,35,24],[88,15,16],[106,28,22],
    [130,18,14],[146,32,20],[168,22,16],[186,38,28],[216,16,14],
    [232,30,18],[252,20,16],[270,34,22],[294,18,14],[310,28,20],[332,14,12]];
  buildings.forEach(([bx,bh,bw])=>{
    ctx.fillStyle='#0A0830';ctx.fillRect(s(bx),s(GH-36-bh),s(bw),s(bh));
    // Windows
    ctx.fillStyle='rgba(255,220,100,.3)';
    for(let wy=bh-4;wy>4;wy-=7)for(let wx=3;wx<bw-3;wx+=5)
      if(Math.sin(bx*wy*.08)>.1)ctx.fillRect(s(bx+wx),s(GH-36-bh+wy),s(2),s(3));
  });

  // ── Ground — dark stone ──
  ctx.fillStyle='#0C0830';ctx.fillRect(0,s(GH-36),cv.width,s(36));
  ctx.fillStyle='rgba(150,100,255,.2)';ctx.fillRect(0,s(GH-36),cv.width,s(1));
  // Stone grid
  ctx.fillStyle='rgba(255,255,255,.04)';
  for(let gx2=0;gx2<GW;gx2+=20)ctx.fillRect(s(gx2),s(GH-36),s(1),s(36));
  ctx.fillRect(0,s(GH-20),s(GW),s(1));

  // ── Animated world icons floating ──
  const icons=['🍄','🐔','⚡','💛'];
  icons.forEach((ic,i)=>{
    const ix=(52+i*58)+Math.sin(frame*.04+i*1.2)*4;
    const iy=GH-80+Math.cos(frame*.05+i*.8)*5;
    ctx.font=s(11)+"px serif";ctx.textAlign='center';ctx.fillText(ic,s(ix),s(iy));
    // Glow beneath
    const gc=['#FF4466','#FFAA00','#44AAFF','#FFD700'][i];
    ctx.globalAlpha=.12+Math.sin(frame*.08+i)*.08;
    ctx.fillStyle=gc;ctx.fillRect(s(ix-12),s(iy+2),s(24),s(8));ctx.globalAlpha=1;
  });

  // ── Player waving in center-left ──
  const wv=Math.sin(frame*.1)*3;
  drawSprite(36,GH-54,1,frame*.4,true,0);

  // ── Title panel ──
  ctx.fillStyle='rgba(0,0,20,.55)';ctx.fillRect(s(GW/2-122),s(14),s(244),s(58));
  ctx.fillStyle='rgba(255,215,0,.15)';ctx.fillRect(s(GW/2-122),s(14),s(244),s(1));

function fireworks(n){

// ── MAIN DRAW ────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(gs==='title'){drTitle();frame++;drawWipe();return;}
  if(gs==='wselect'){drWorldSelect();frame++;drawWipe();return;}
  if(gs==='win'){drWin();frame++;drawWipe();return;}
  if(gs==='wclear'){drWClear();frame++;drawWipe();return;}
  decShake();
  ctx.save();
  if(Math.abs(shkX)>.2||Math.abs(shkY)>.2)ctx.translate(s(shkX),s(shkY));
  const L=LDATA[lvlI];
  if(L.type==='mario'){
    drMarioWorld();drParts(true);drPlayer();drHUD();
  } else if(L.type==='ci'){
    drCIWorld();drHUD();
  } else if(L.type==='dash'){
    drDashWorld();drHUD();
  } else if(L.type==='final'){
    drFinalWorld();
  }
  if(gs==='intro')drIntro();
  if(gs==='pause')drPause();
  if(gs==='over'||gs==='msg'){ctx.fillStyle='rgba(0,0,0,.28)';ctx.fillRect(0,0,cv.width,cv.height);}
  if(gs==='over')drGameOver();
  ctx.restore();
  drawWipe(); // drawn AFTER restore so it's always on top, never inside save/restore
}

// ── LOOP ─────────────────────────────────────────────────────
function loop(){updateMusicTheme();update();draw();requestAnimationFrame(loop);}
loop();
</script>
